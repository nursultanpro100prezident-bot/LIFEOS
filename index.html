<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIFEOS — Умный календарь</title>

<!-- Geist Sans + Geist Mono via Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Dexie (IndexedDB wrapper) — must load BEFORE storage scripts -->
<script src="https://unpkg.com/dexie@4.0.10/dist/dexie.min.js" crossorigin="anonymous"></script>
</head>
<body data-palette="pastels" data-theme="light" data-density="cozy">
<div id="app"></div>

<!--
  Load order (critical):
  1. storage/db.js    — IndexedDB layer (plain JS, needs Dexie global)
  2. storage/sync.js  — File System + Gist layer (plain JS, needs LIFEOS_DB)
  3. data.jsx         — Default/demo data → window.LIFEOS_DATA
  4. views.jsx        — UI components (read LIFEOS_DATA refs)
  5. overlays.jsx     — Modal components
  6. tweaks-panel.jsx — Tweaks panel + useTweaks
  7. app.jsx          — Root: inits DB, loads data, wires everything together
-->
<script src="storage/db.js"></script>
<script src="storage/sync.js"></script>

<script type="text/babel" src="data.js"></script>
<script type="text/babel" src="views.js"></script>
<script type="text/babel" src="overlays.js"></script>
<script type="text/babel" src="tweaks-panel.js"></script>
<script type="text/babel" src="app.js"></script>
</body>
</html>
