// Tints per category — derived from --c-* (L C H) on the fly:
// background = oklch(L% C H / 0.45)
// edge      = oklch(L% C H / 0.65)
// bar       = oklch( (L-25)% (C+0.10) H )  // strong stripe
// ink       = oklch( 28% C H )             // text on tint (dark)

function tintStyle(catId) {
  // catId is the React-side id: business, health, learning, creative, family, work, finance
  // Each maps to a CSS palette block --c-{catId}, --c-{catId}-bar, --c-{catId}-ink defined in styles.css
  return {
    '--tint':      `var(--c-${catId})`,
    '--tint-edge': `var(--c-${catId}-bar)`,
    '--tint-bar':  `var(--c-${catId}-bar)`,
    '--tint-ink':  `var(--c-${catId}-ink)`,
  };
}

// Each --c-* in CSS is an "L% C H" triplet (NOT a full color).
// We compose oklch() colors via these custom-property strings in CSS,

// ============== UTILITIES ==============
const HOUR_PX = 56;   // height of one hour in day-view
const DAY_START = 6;  // 06:00
const DAY_END = 22;   // 22:00

function fmtH(hFloat) {

  const m = Math.round((hFloat - h) * 60);
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

const DOW_SHORT = ['пн','вт','ср','чт','пт','сб','вс'];
const DOW_FULL  = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_RU_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

// Demo "now" — fixed for prototype: Wed May 20 2026, 10:28
const NOW = { day: 2, hour: 10 + 28/60 };
const WEEK_DATES = [18, 19, 20, 21, 22, 23, 24]; // mon-sun

// ============== SIDEBAR ==============
// blocks + categories passed as props so useMemo reacts to live data changes
function Sidebar({ blocks, categories, catFilters, setCatFilters, selectedDay, setSelectedDay, onOpenCategory }) {

    const days = 31;

    for (let i = 1; i <= days; i++) cells.push({ d: i, dim: false });
    while (cells.length < totalCells) cells.push({ d: cells.length - dimBefore - days + 1, dim: true });
    return cells;
  }, []);

  const toggleCat = (id) => {
    const next = new Set(catFilters);

    const m = {};

    return m;
  }, [blocks]);

  return (
    <aside className="sidebar">
      <div>
        <h2 className="side-section-title">Май · 2026</h2>
        <div className="mini-month">
          {['П','В','С','Ч','П','С','В'].map((d, i) => <div className="dow" key={i}>{d}</div>)}
          {monthGrid.map((c, i) => {
            if (c.dim) return <div key={i} className="day dim">{c.d}</div>;

                key={i}
                className={`day ${isToday ? 'today' : ''} ${isSel ? 'sel' : ''}`}

      <div>
        <h2 className="side-section-title">Направления жизни</h2>

              <div
                key={cat.id}
                className={`cat-row ${active ? '' : 'muted'}`}
                style={tintStyle(cat.id)}
                onClick={(e) => { e.stopPropagation(); toggleCat(cat.id); }}
                onDoubleClick={() => onOpenCategory(cat.id)}
              >
                <span className="cat-dot" />
                <span style={{ flex: 1 }}>{cat.nameRu}</span>
                <span className="cat-count">{counts[cat.id] || 0}</span>

        </div>
        <div style={{ marginTop: 10, fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-3)', letterSpacing: '0.04em', padding: '6px 8px' }}>
          dbl-click · открыть профиль
        </div>
      </div>

      <div style={{ marginTop: 'auto' }}>
        <h2 className="side-section-title">Быстро</h2>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <button className="cat-row" style={{ fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.04em' }}>
            <kbd style={{ background: 'var(--bg-soft)', border: '1px solid var(--hairline)', borderRadius: 6, padding: '2px 6px', fontSize: 10 }}>⌘K</kbd>
            <span>Quick add</span>
          </button>
          <button className="cat-row" style={{ fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.04em' }}>
            <kbd style={{ background: 'var(--bg-soft)', border: '1px solid var(--hairline)', borderRadius: 6, padding: '2px 6px', fontSize: 10 }}>⌘F</kbd>

// ============== TIME BLOCK ==============
function TimeBlock({ block, hourPx = HOUR_PX, dayStart = DAY_START, onClick, compact = false, density = 'cozy' }) {
  const cat = CAT_BY_ID[block.cat];
  const top = (block.start - dayStart) * hourPx;
  const height = Math.max((block.end - block.start) * hourPx - 2, 22);
  return (
    <button
      className={`block ${compact ? 'compact' : ''} block-${density}`}

      {!compact && height > 36 && (

          {fmtH(block.start)}<span style={{ opacity: 0.5 }}>—</span>{fmtH(block.end)}

}

// ============== DAY VIEW ==============
function DayView({ blocks, allDayItems, dayIndex, onOpenBlock }) {
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h++) hours.push(h);

  const isToday = dayIndex === NOW.day;
  const containerRef = useRef(null);

  // Resolve overlap into columns
  const laid = useMemo(() => layoutOverlaps(blocks), [blocks]);

  // Scroll to ~now on mount
  useEffect(() => {
    if (containerRef.current && isToday) {
      const targetY = (NOW.hour - DAY_START - 1) * HOUR_PX;
      containerRef.current.scrollTop = Math.max(0, targetY);
    }
  }, [isToday]);

  return (
    <div className="dayview" ref={containerRef}>
      <div className="hours-gutter" style={{ height: (DAY_END - DAY_START) * HOUR_PX + 24 }}>
        {hours.map(h => (
          <div key={h} className="hour-label" style={{ top: (h - DAY_START) * HOUR_PX }}>
            {String(h).padStart(2, '0')}:00
          </div>
        ))}
      </div>
      <div className="day-canvas" style={{ height: (DAY_END - DAY_START) * HOUR_PX + 24, position: 'relative' }}>
        {hours.map(h => (
          <div key={h} className="day-grid-line" style={{ top: (h - DAY_START) * HOUR_PX }} />
        ))}
        {hours.slice(0, -1).map(h => (
          <div key={`h${h}`} className="day-grid-line half" style={{ top: (h + 0.5 - DAY_START) * HOUR_PX }} />
        ))}

        {laid.map(({ block, col, cols }) => {
          const cat = CAT_BY_ID[block.cat];
          const top = (block.start - DAY_START) * HOUR_PX;
          const height = Math.max((block.end - block.start) * HOUR_PX - 3, 24);
          const widthPct = 100 / cols;
          const leftPct = col * widthPct;
          return (
            <button
              key={block.id}
              className="block"
              style={{
                ...tintStyle(block.cat),
                top, height,
                left: `calc(${leftPct}% + 12px)`,
                width: `calc(${widthPct}% - 16px)`,
                right: 'auto',
              }}
              onClick={() => onOpenBlock(block)}
              data-block-id={block.id}
            >
              <div className="block-title">{block.title}</div>
              {height > 40 && (
                <div className="block-time">
                  {fmtH(block.start)} <span style={{ opacity: 0.5 }}>→</span> {fmtH(block.end)}
                  {block.recur && <span className="recur" style={{ marginLeft: 'auto' }}><Icon name="recur" size={11}/></span>}
                </div>
              )}
              {height > 80 && block.location && (
                <div className="block-meta">
                  <Icon name="pin" size={11}/>{block.location}
                </div>
              )}
              {height > 110 && block.checklist && (
                <div className="block-meta">
                  <Icon name="check" size={11}/>{block.checklist.length} пунктов
                </div>
              )}
            </button>
          );
        })}

        {isToday && (
          <div className="now-bar" style={{ top: (NOW.hour - DAY_START) * HOUR_PX }}>
            <span className="now-label">{fmtH(NOW.hour)}</span>
          </div>
        )}
      </div>
    </div>
  );
}

// Greedy column packing for overlapping blocks
function layoutOverlaps(blocks) {
  const sorted = [...blocks].sort((a, b) => a.start - b.start || b.end - b.start - (a.end - a.start));
  const cols = []; // cols[i] = last end time
  const placed = [];
  for (const b of sorted) {
    let placedCol = -1;
    for (let i = 0; i < cols.length; i++) {
      if (cols[i] <= b.start) { placedCol = i; break; }
    }
    if (placedCol === -1) { cols.push(b.end); placedCol = cols.length - 1; }
    else cols[placedCol] = b.end;
    placed.push({ block: b, col: placedCol });
  }
  // For each block, determine the total parallel cols at that time
  return placed.map(({ block, col }) => {
    const parallel = placed.filter(p => p.block.start < block.end && p.block.end > block.start);
    const maxCol = Math.max(...parallel.map(p => p.col));
    return { block, col, cols: maxCol + 1 };
  });
}

// ============== WEEK VIEW ==============
// blocks passed as prop so colDensity and rendering react to live data changes
function WeekView({ blocks, onOpenBlock, density, onSelectDay }) {
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h++) hours.push(h);

  // Categorical density per day — recomputes when blocks changes
  const colDensity = useMemo(() => {
    const out = WEEK_DATES.map(() => ({}));
    blocks.forEach(b => {
      if (b.day >= 0 && b.day < WEEK_DATES.length) {
        out[b.day][b.cat] = (out[b.day][b.cat] || 0) + (b.end - b.start);
      }
    });
    return out;
  }, [blocks]);

  return (
    <div className="weekview">
      <div className="hours-gutter" style={{ paddingTop: 88, position: 'relative' }}>
        {hours.map(h => (
          <div key={h} className="hour-label" style={{ top: 88 + (h - DAY_START) * HOUR_PX }}>
            {String(h).padStart(2, '0')}:00
          </div>
        ))}
      </div>

      <div className="weekgrid">
        <div className="week-heads">
          {WEEK_DATES.map((date, i) => (
            <div key={i} className={`week-head ${i === NOW.day ? 'today' : ''}`} onClick={() => onSelectDay && onSelectDay(i)}>
              <div className="dow">{DOW_SHORT[i]}</div>
              <div className="dom">{date}</div>
              <div className="density-bar">
                {Object.entries(colDensity[i]).map(([cat, h]) => (
                  <span key={cat} style={{ '--seg': `var(--c-${cat}-bar)`, flex: h }} />
                ))}
              </div>
            </div>
          ))}
        </div>

        <div className="week-cols">
          {WEEK_DATES.map((date, dayIdx) => {
            const dayBlocks = blocks.filter(b => b.day === dayIdx);
            const laid = layoutOverlaps(dayBlocks);
            return (
              <div key={dayIdx} className={`week-col ${dayIdx === NOW.day ? 'today' : ''}`} style={{ height: (DAY_END - DAY_START) * HOUR_PX + 24 }}>
                {hours.map(h => (
                  <div key={h} className="day-grid-line" style={{ top: (h - DAY_START) * HOUR_PX }} />
                ))}
                {laid.map(({ block, col, cols }) => {
                  const top = (block.start - DAY_START) * HOUR_PX;
                  const height = Math.max((block.end - block.start) * HOUR_PX - 2, 18);
                  const widthPct = 100 / cols;
                  return (
                    <button
                      key={block.id}
                      className="block"
                      style={{
                        ...tintStyle(block.cat),
                        top, height,
                        left: `calc(${col * widthPct}% + 3px)`,
                        width: `calc(${widthPct}% - 6px)`,
                        right: 'auto',
                      }}
                      onClick={() => onOpenBlock(block)}
                      data-block-id={block.id}
                    >
                      <div className="block-title" style={{ fontSize: 11.5 }}>{block.title}</div>
                      {height > 28 && (
                        <div className="block-time" style={{ fontSize: 9.5 }}>{fmtH(block.start)}</div>
                      )}
                    </button>
                  );
                })}
                {dayIdx === NOW.day && (
                  <div className="now-bar" style={{ top: (NOW.hour - DAY_START) * HOUR_PX, left: 0 }}>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============== DAILY SUMMARY ==============
function DailySummary({ dayIndex, onOpenOverview }) {
  const dayBlocks = WEEK_BLOCKS.filter(b => b.day === dayIndex);
  const allDay = ALL_DAY.filter(a => a.day === dayIndex);
  const tasks = allDay.filter(a => a.type === 'task').length;
  const reminders = allDay.filter(a => a.type === 'reminder').length;
  const overdue = dayIndex === NOW.day ? 1 : 0;
  const totalHrs = dayBlocks.reduce((s, b) => s + (b.end - b.start), 0);

  return (
    <div className="summary">
      <button className="sum-chip" onClick={onOpenOverview}>
        <span className="sum-num">{dayBlocks.length}</span>
        <span>тайм-блоков</span>
        <span style={{ color: 'var(--ink-3)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>· {totalHrs.toFixed(1)} ч</span>
      </button>
      <button className="sum-chip">
        <span className="sum-num">{tasks}</span>
        <span>задач</span>
      </button>
      <button className="sum-chip">
        <span className="sum-num">{reminders}</span>
        <span>напомнить</span>
      </button>
      {overdue > 0 && (
        <button className="sum-chip alert">
          <span className="sum-num">{overdue}</span>
          <span>просрочено</span>
        </button>
      )}
    </div>
  );
}

window.LIFEOS_VIEWS = { Sidebar, DayView, WeekView, DailySummary, Icon, fmtH, DOW_FULL, MONTHS_RU, MONTHS_RU_GEN, WEEK_DATES, NOW, HOUR_PX, DAY_START, DAY_END, layoutOverlaps };

</script>

<script type="text/babel">
/* eslint-disable */
// LIFEOS — overlays.jsx
// L1 Time Block modal + L2 Category Profile (signature expanding animation).
// Quick Add sheet + Global Search modal + Day Overview sheet.
//
// STORAGE: QuickAdd saves to IndexedDB. BlockOverlay loads/saves checklist.

const { useState: useStateO, useEffect: useEffectO, useRef: useRefO, useMemo: useMemoO } = React;
const VIEWS = window.LIFEOS_VIEWS;
const DATA = window.LIFEOS_DATA;
const { Icon, fmtH } = VIEWS;
// NOTE: CATEGORIES, CAT_BY_ID, WEEK_BLOCKS are read from DATA at render time
// (via DATA.CATEGORIES etc.) so they always reflect the latest spliced arrays.
const { tintStyle } = DATA;

// ============== L1 + L2 SHARED CARD ==============
function BlockOverlay({ block, onClose, initialPhase = 'l1' }) {
  const [phase, setPhase] = useStateO(initialPhase);
  const [closing, setClosing] = useStateO(false);
  const [checkedItems, setCheckedItems] = useStateO(new Set());
  const [checklistLoaded, setChecklistLoaded] = useStateO(false);

  const cat = DATA.CAT_BY_ID[block.cat];

  // Load persisted checklist state from IndexedDB
  useEffectO(() => {
    if (!window.LIFEOS_DB || !block.id) return;
    window.LIFEOS_DB.loadChecklistState(block.id).then(saved => {
      setCheckedItems(saved);
      setChecklistLoaded(true);
    });
  }, [block.id]);

  const close = () => {
    setClosing(true);
    setTimeout(onClose, 320);
  };

  useEffectO(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') {
        if (phase === 'l2') setPhase('l1');
        else close();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [phase]);

  const goalProgress = cat.goals.reduce((s, g) => s + g.progress, 0) / cat.goals.length;

  const toggleCheck = async (i) => {
    const next = new Set(checkedItems);
    if (next.has(i)) next.delete(i); else next.add(i);
    setCheckedItems(next);
    // Persist to DB (fire-and-forget, no reload needed)
    if (window.LIFEOS_DB) {
      window.LIFEOS_DB.saveChecklistState(block.id, next);
    }
  };

  const cardStyle = phase === 'l2'
    ? { left: '0', top: '0', right: '0', bottom: '0', width: '100%', height: '100%', borderRadius: 0, border: 'none' }
    : { left: '50%', top: '50%', width: 'min(640px, 90vw)', height: 'min(820px, 88vh)', transform: 'translate(-50%, -50%)', borderRadius: 'var(--r-lg)' };

  return (
    <>
      <div className="scrim" onClick={close} style={{ opacity: closing ? 0 : undefined, transition: 'opacity 280ms var(--ease)' }} />
      <div
        className={`l1-l2-card ${phase} ${closing ? 'closing' : ''}`}
        style={{
          ...tintStyle(block.cat),
          position: 'fixed',
          zIndex: 65,
          background: 'var(--bg)',
          boxShadow: 'var(--shadow-modal)',
          overflow: 'hidden',
          display: 'flex',
          flexDirection: 'column',
          transition: 'all 520ms var(--ease)',
          opacity: closing ? 0 : 1,
          ...cardStyle,
        }}
      >
        <SharedHero block={block} cat={cat} phase={phase} onBack={() => setPhase('l1')} onClose={close} goalProgress={goalProgress} />

        <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', inset: 0,
            opacity: phase === 'l1' ? 1 : 0,
            transform: phase === 'l1' ? 'translateY(0)' : 'translateY(-12px)',
            transition: 'opacity 220ms var(--ease), transform 320ms var(--ease)',
            pointerEvents: phase === 'l1' ? 'auto' : 'none',
            overflowY: 'auto',
          }}>
            <L1Body block={block} cat={cat} checkedItems={checkedItems} toggleCheck={toggleCheck} onOpenContext={() => setPhase('l2')} />
          </div>
          <div style={{
            position: 'absolute', inset: 0,
            opacity: phase === 'l2' ? 1 : 0,
            transform: phase === 'l2' ? 'translateY(0)' : 'translateY(12px)',
            transition: 'opacity 320ms 120ms var(--ease), transform 520ms var(--ease)',
            pointerEvents: phase === 'l2' ? 'auto' : 'none',
            overflowY: 'auto',
          }}>
            <L2Body cat={cat} block={block} />
          </div>
        </div>
      </div>
    </>
  );
}

function SearchModal({ onClose, onOpenBlock, onOpenCategory }) {
  const [q, setQ] = useStateO('');
  const inputRef = useRefO(null);
  useEffectO(() => { inputRef.current?.focus(); }, []);
  useEffectO(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Use DATA refs directly so results reflect live data (WEEK_BLOCKS is spliced in-place)
  const results = useMemoO(() => {
    const norm = q.trim().toLowerCase();
    const CATEGORIES  = DATA.CATEGORIES;
    const CAT_BY_ID   = DATA.CAT_BY_ID;
    const WEEK_BLOCKS = DATA.WEEK_BLOCKS;
    const blocks = WEEK_BLOCKS.filter(b => !norm || b.title.toLowerCase().includes(norm) || (b.notes && b.notes.toLowerCase().includes(norm)));
    const cats   = CATEGORIES.filter(c => !norm || c.nameRu.toLowerCase().includes(norm) || c.name.toLowerCase().includes(norm) || c.tagline.toLowerCase().includes(norm));
    const goals  = CATEGORIES.flatMap(c => c.goals.map(g => ({ ...g, catId: c.id, catName: c.nameRu }))).filter(g => !norm || g.title.toLowerCase().includes(norm));
    const notes  = CATEGORIES.filter(c => !norm || (c.notes && c.notes.toLowerCase().includes(norm)));
    return { blocks: blocks.slice(0, 6), cats: cats.slice(0, 4), goals: goals.slice(0, 4), notes: notes.slice(0, 3) };
  }, [q]);

  return (
    <>
      <div className="scrim" onClick={onClose}/>
      <div className="sheet entering" style={{ left: '50%', top: '12%', transform: 'translateX(-50%)', width: 'min(720px, 92vw)', maxHeight: '76vh' }}>
        <div className="search-input-row">
          <Icon name="search" size={20}/>
          <input
            ref={inputRef}
            className="search-input"
            placeholder="Поиск по жизни: блоки, заметки, цели, направления…"
            value={q}
            onChange={(e) => setQ(e.target.value)}
          />
          <span className="search-kbd">esc</span>
        </div>
        <div className="search-results">
          {results.blocks.length > 0 && (
            <>
              <div className="search-group-title">Тайм-блоки · {results.blocks.length}</div>
              {results.blocks.map(b => {
                const c = DATA.CAT_BY_ID[b.cat];
                return (
                  <div key={b.id} className="search-row" style={tintStyle(b.cat)} onClick={() => { onOpenBlock(b); onClose(); }}>
                    <div className="sr-icon"><Icon name="clock" size={16}/></div>
                    <div className="sr-main">
                      <div className="sr-title">{b.title}</div>
                      <div className="sr-sub">{VIEWS.DOW_FULL[b.day]} · {fmtH(b.start)} — {fmtH(b.end)} · {c.nameRu}</div>
                    </div>
                    <Icon name="chevron-r" size={14}/>
                  </div>
                );
              })}
            </>
          )}
          {results.cats.length > 0 && (
            <>
              <div className="search-group-title">Направления</div>
              {results.cats.map(c => (
                <div key={c.id} className="search-row" style={tintStyle(c.id)} onClick={() => { onOpenCategory(c.id); onClose(); }}>
                  <div className="sr-icon"><Icon name={c.icon} size={16}/></div>
                  <div className="sr-main">
                    <div className="sr-title">{c.nameRu} <span style={{ color: 'var(--ink-3)', fontFamily: 'var(--font-mono)', fontSize: 11, marginLeft: 6 }}>{c.name}</span></div>
                    <div className="sr-sub">{c.tagline}</div>
                  </div>
                  <Icon name="chevron-r" size={14}/>
                </div>
              ))}
            </>
          )}
          {results.goals.length > 0 && (
            <>
              <div className="search-group-title">Цели</div>
              {results.goals.map(g => (
                <div key={g.id} className="search-row" style={tintStyle(g.catId)} onClick={() => { onOpenCategory(g.catId); onClose(); }}>
                  <div className="sr-icon"><Icon name="flag" size={16}/></div>
                  <div className="sr-main">
                    <div className="sr-title">{g.title}</div>
                    <div className="sr-sub">{g.catName} · {g.due} · {g.progress}%</div>
                  </div>
                  <Icon name="chevron-r" size={14}/>
                </div>
              ))}
            </>
          )}
          {results.notes.length > 0 && (
            <>
              <div className="search-group-title">Заметки направлений</div>
              {results.notes.map(c => (
                <div key={c.id} className="search-row" style={tintStyle(c.id)} onClick={() => { onOpenCategory(c.id); onClose(); }}>
                  <div className="sr-icon"><Icon name="note" size={16}/></div>
                  <div className="sr-main">
                    <div className="sr-title">{c.nameRu} · заметка</div>
                    <div className="sr-sub" style={{ whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 460 }}>{c.notes}</div>
                  </div>
                </div>
              ))}
            </>
          )}
          {results.blocks.length === 0 && results.cats.length === 0 && results.goals.length === 0 && q.trim() && (
            <div style={{ padding: '32px 16px', textAlign: 'center', color: 'var(--ink-3)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>
              Ничего не найдено по «{q}»
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ============== QUICK ADD ==============
// Now actually saves to IndexedDB. Requires props: currentDay, onBlockSaved.
function QuickAdd({ onClose, onBlockSaved, currentDay = 0, defaultCatId = 'business' }) {
  const [tab, setTab] = useStateO('block');      // 'block' | 'task' | 'reminder'
  const [cat, setCat] = useStateO(defaultCatId);
  const [title, setTitle] = useStateO('');
  const [startH, setStartH] = useStateO(9);
  const [startM, setStartM] = useStateO(0);
  const [endH, setEndH] = useStateO(10);
  const [endM, setEndM] = useStateO(0);
  const [saving, setSaving] = useStateO(false);
  const inputRef = useRefO(null);

  useEffectO(() => { inputRef.current?.focus(); }, []);
  useEffectO(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const handleCreate = async () => {
    const trimmed = title.trim();
    if (!trimmed) { inputRef.current?.focus(); return; }
    setSaving(true);
    try {
      if (tab === 'block') {
        const start = startH + startM / 60;
        const end   = endH   + endM   / 60;
        const newBlock = {
          id:    'user_' + Date.now(),
          day:   currentDay,
          start: start,
          end:   end > start ? end : start + 1,
          title: trimmed,
          cat:   cat,
        };
        await window.LIFEOS_DB.saveBlock(newBlock);
      } else {
        const newItem = {
          id:    'allday_' + Date.now(),
          day:   currentDay,
          title: trimmed,
          cat:   cat,
          type:  tab,  // 'task' | 'reminder'
        };
        await window.LIFEOS_DB.saveAllDay(newItem);
      }
      if (onBlockSaved) onBlockSaved();
    } catch(e) {
      console.error('[LIFEOS] QuickAdd save failed:', e);
    }
    onClose();
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleCreate(); }
  };

  const DOW_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

  return (
    <>
      <div className="scrim" onClick={onClose}/>
      <div className="sheet entering" style={{ left: '50%', top: '50%', transform: 'translate(-50%, -50%)', width: 'min(560px, 92vw)' }}>
        <div style={{ padding: '20px 22px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-3)' }}>
            {DOW_SHORT[currentDay]} · Быстро · что создать
          </div>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={16}/></button>
        </div>

        <div className="qa-tabs">
          <button aria-pressed={tab === 'block'}    onClick={() => setTab('block')}>Тайм-блок</button>
          <button aria-pressed={tab === 'task'}     onClick={() => setTab('task')}>Задача</button>
          <button aria-pressed={tab === 'reminder'} onClick={() => setTab('reminder')}>Напоминание</button>
        </div>

        <div className="qa-form">
          <input
            ref={inputRef}
            autoFocus
            className="qa-title-input"
            placeholder={tab === 'block' ? 'Название тайм-блока' : tab === 'task' ? 'Что нужно сделать?' : 'О чём напомнить?'}
            value={title}
            onChange={(e) => setTitle(e.target.value)}
            onKeyDown={handleKey}
          />

          {tab === 'block' && (
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
              {/* Start time */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)' }}>с</span>
                <select
                  className="qa-time-select"
                  value={startH}
                  onChange={e => {
                    const h = Number(e.target.value);
                    setStartH(h);
                    if (h >= endH) setEndH(h + 1);
                  }}
                  style={timeSelectStyle}
                >
                  {Array.from({length: 18}, (_, i) => i + 6).map(h => (
                    <option key={h} value={h}>{String(h).padStart(2,'0')}:00</option>
                  ))}
                </select>
              </div>
              {/* End time */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)' }}>до</span>
                <select
                  className="qa-time-select"
                  value={endH}
                  onChange={e => setEndH(Number(e.target.value))}
                  style={timeSelectStyle}
                >
                  {Array.from({length: 18}, (_, i) => i + 7).map(h => (
                    <option key={h} value={h} disabled={h <= startH}>{String(h).padStart(2,'0')}:00</option>
                  ))}
                </select>
              </div>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', marginLeft: 2 }}>
                · {endH - startH} ч
              </span>
            </div>
          )}

          <div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 8 }}>Направление</div>
            <div className="qa-cat-picker">
              {DATA.CATEGORIES.map(c => (
                <button
                  key={c.id}
                  className="qa-cat-chip"
                  style={tintStyle(c.id)}
                  aria-pressed={cat === c.id}
                  onClick={() => setCat(c.id)}
                >
                  <span className="qcc-dot"/>{c.nameRu}
                </button>
              ))}

function DayOverview({ dayIndex, onClose, onOpenBlock }) {

  blocks.forEach(b => { totals[b.cat] = (totals[b.cat] || 0) + (b.end - b.start); });

// ── useTweaks ───────────────────────────────────────────────────────────────
// Persists tweak values in localStorage (survives page reloads and browser restarts).
// Also maintains postMessage compatibility for the FleetView/Cowork iframe editor.
const TWEAKS_STORAGE_KEY = 'lifeos_tweaks';

function useTweaks(defaults) {
  const [values, setValues] = React.useState(() => {
    // Load persisted values from localStorage on first render
    try {
      const saved = localStorage.getItem(TWEAKS_STORAGE_KEY);
      if (saved) return Object.assign({}, defaults, JSON.parse(saved));
    } catch (e) {}
    return defaults;
  });

  // Apply persisted theme/palette to <body> on first mount
  React.useEffect(() => {
    try {
      const saved = localStorage.getItem(TWEAKS_STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.palette) document.body.setAttribute('data-palette', parsed.palette);
        if (parsed.theme)   document.body.setAttribute('data-theme',   parsed.theme);
        if (parsed.density) document.body.setAttribute('data-density', parsed.density);
      }
    } catch (e) {}
  }, []);

  // Accepts either setTweak('key', value) or setTweak({ key: value, ... })
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };

    setValues((prev) => {
      const next = Object.assign({}, prev, edits);
      // Persist to localStorage
      try { localStorage.setItem(TWEAKS_STORAGE_KEY, JSON.stringify(next)); } catch (e) {}
      return next;
    });

    // Keep postMessage for FleetView/Cowork iframe editor compatibility
    if (window.parent !== window) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    }
    // Same-window signal for in-page listeners
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);

  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
/* eslint-disable */
// LIFEOS — app.jsx — main shell
// Initialises IndexedDB on mount, loads live data, threads it as props.
// Three-layer storage: IndexedDB → File on disk → GitHub Gist.

const {
  useState:   useStateA,
  useEffect:  useEffectA,
  useCallback: useCallbackA,
  useMemo:    useMemoA,
} = React;

const V = window.LIFEOS_VIEWS;
const O = window.LIFEOS_OVERLAYS;
const D = window.LIFEOS_DATA;    // always reflects latest spliced arrays

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette":     "pastels",
  "theme":       "light",
  "density":     "cozy",
  "showSidebar": true
}/*EDITMODE-END*/;

// ── Helpers ───────────────────────────────────────────────────────────────────

/** Splice arr contents in place so module-level var references stay valid */
function spliceArr(arr, newItems) {
  arr.splice(0, arr.length, ...newItems);
}

/** Apply loaded data into the shared window.LIFEOS_DATA globals */
function applyToGlobals({ categories, blocks, allDay }) {
  spliceArr(D.CATEGORIES, categories);
  spliceArr(D.WEEK_BLOCKS, blocks);
  spliceArr(D.ALL_DAY, allDay);
  // Update CAT_BY_ID in-place (components reference same object)
  categories.forEach(c => { D.CAT_BY_ID[c.id] = c; });
}

// ── Loading screen ────────────────────────────────────────────────────────────
function LoadingScreen() {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      height: '100vh', gap: 16, color: 'var(--ink-3)',
    }}>
      <div style={{
        width: 32, height: 32, borderRadius: '50%',
        border: '2px solid var(--hairline-2)',
        borderTopColor: 'var(--ink)',
        animation: 'lifeos-spin 0.7s linear infinite',
      }}/>
      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.08em' }}>
        LIFEOS · загрузка данных…
      </div>
      <style>{`@keyframes lifeos-spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

// ── Storage settings panel ────────────────────────────────────────────────────
function StorageSettings({ syncStatus, onSyncStatusChange }) {
  const [gistToken, setGistToken] = useStateA('');
  const [gistStatus, setGistStatus] = useStateA('');
  const [fileStatus, setFileStatus] = useStateA('');
  const [importing, setImporting] = useStateA(false);
  const fileInputRef = React.useRef(null);

  const handlePickFile = async () => {
    setFileStatus('выбираю…');
    const result = await window.LIFEOS_SYNC.pickSaveFile();
    if (result.status === 'configured') {
      setFileStatus('✅ файл подключён');
      onSyncStatusChange();
    } else if (result.status === 'cancelled') {
      setFileStatus('');
    } else if (result.status === 'unsupported') {
      setFileStatus('⚠️ браузер не поддерживает (нужен Chrome/Edge)');
    } else {
      setFileStatus('❌ ' + (result.message || 'ошибка'));
    }
  };

  const handleConnectGist = async () => {
    const token = gistToken.trim();
    if (!token) return;
    setGistStatus('подключаю…');
    const result = await window.LIFEOS_SYNC.setupGist(token);
    if (result.status === 'configured') {
      setGistStatus(result.existingDataFound
        ? '✅ подключён · найдены существующие данные'
        : '✅ подключён · создан новый Gist');
      setGistToken('');
      onSyncStatusChange();
    } else if (result.status === 'invalid_token') {
      setGistStatus('❌ неверный токен');
    } else {
      setGistStatus('❌ ' + (result.message || 'ошибка сети'));
    }
  };

  const handleSyncNow = async () => {
    setGistStatus('синхронизирую…');
    await window.LIFEOS_SYNC.syncNow();
    setGistStatus('✅ синхронизировано в ' + new Date().toLocaleTimeString());
  };

  const handleImport = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    try {
      await window.LIFEOS_SYNC.importFromFile(file);
      // Data reload happens via onDataChange callback in App
    } catch(err) {
      alert('Ошибка импорта: ' + err.message);
    }
    setImporting(false);
    e.target.value = '';
  };

  const lastSync = window.LIFEOS_SYNC.getLastSync
    ? window.LIFEOS_SYNC.getLastSync()
    : null;

  return (
    <>
      {/* ── File System ── */}
      <window.TweakSection label="Файл на диске · Слой 2">
        <div style={{ fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.5, marginBottom: 6 }}>
          {syncStatus.fileConfigured
            ? '✅ Файл подключён — данные пишутся автоматически'
            : '⚠️ Не настроен — данные могут потеряться при очистке браузера'}
        </div>
        <window.TweakButton
          label={syncStatus.fileConfigured ? 'Изменить файл' : '+ Выбрать файл сохранения'}
          onClick={handlePickFile}
          secondary={syncStatus.fileConfigured}
        />
        {fileStatus && (
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-2)', marginTop: 4 }}>
            {fileStatus}
          </div>
        )}
      </window.TweakSection>

      {/* ── GitHub Gist ── */}
      <window.TweakSection label="GitHub Gist · Слой 3">
        {syncStatus.gistConfigured ? (
          <>
            <div style={{ fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.5, marginBottom: 6 }}>
              ✅ Подключён · автосинхронизация каждые 15 мин
              {lastSync && (
                <div style={{ marginTop: 2 }}>
                  Последняя: {lastSync.toLocaleTimeString()}
                </div>
              )}
            </div>
            <window.TweakButton label="Синхронизировать сейчас" onClick={handleSyncNow} secondary />
            {gistStatus && (
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-2)', marginTop: 4 }}>
                {gistStatus}
              </div>
            )}
          </>
        ) : (
          <>
            <div style={{ fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.5, marginBottom: 6 }}>
              Вставьте GitHub Personal Access Token (scope: gist).{' '}
              <a
                href="https://github.com/settings/tokens/new?scopes=gist&description=LIFEOS"
                target="_blank"
                rel="noopener"
                style={{ color: 'inherit' }}
              >Создать токен →</a>
            </div>
            <input
              style={{
                fontFamily: 'var(--font-mono)', fontSize: 11,
                border: '0.5px solid rgba(0,0,0,.15)', borderRadius: 7,
                padding: '5px 8px', width: '100%', boxSizing: 'border-box',
                background: 'rgba(255,255,255,.7)', outline: 'none',
              }}
              placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
              value={gistToken}
              onChange={e => setGistToken(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') handleConnectGist(); }}
            />
            <window.TweakButton label="Подключить Gist" onClick={handleConnectGist} />
            {gistStatus && (
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-2)', marginTop: 4 }}>
                {gistStatus}
              </div>
            )}
          </>
        )}
      </window.TweakSection>

      {/* ── Manual backup ── */}
      <window.TweakSection label="Ручной бэкап">
        <window.TweakButton
          label="⬇ Скачать backup.json"
          onClick={() => window.LIFEOS_SYNC.downloadBackup()}
          secondary
        />
        <window.TweakButton
          label={importing ? 'Импортирую…' : '⬆ Восстановить из файла'}
          onClick={() => fileInputRef.current?.click()}
          secondary
        />
        <input
          ref={fileInputRef}
          type="file"
          accept=".json,application/json"
          style={{ display: 'none' }}
          onChange={handleImport}
        />
      </window.TweakSection>
    </>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  // ── Loading state ──────────────────────────────────────────────────────────
  const [loading, setLoading] = useStateA(true);

  // ── Live data (blocks + categories + allDay as React state) ───────────────
  const [data, setData] = useStateA({
    categories: D.CATEGORIES,
    blocks:     D.WEEK_BLOCKS,
    allDay:     D.ALL_DAY,
  });

  // ── Sync status (for StorageSettings UI) ──────────────────────────────────
  const [syncStatus, setSyncStatus] = useStateA({
    fileConfigured: false,
    gistConfigured: false,
  });

  const refreshSyncStatus = useCallbackA(() => {
    if (window.LIFEOS_SYNC) {
      setSyncStatus({
        fileConfigured: window.LIFEOS_SYNC.isFileConfigured(),
        gistConfigured: window.LIFEOS_SYNC.isGistConfigured(),
      });
    }
  }, []);

  // ── DB init on mount ───────────────────────────────────────────────────────
  useEffectA(() => {
    async function init() {
      // 1. Request persistent storage (protects IndexedDB from auto-eviction)
      if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persist().then(granted => {
          console.log('[LIFEOS] Persistent storage:', granted ? '✅' : '⚠️ not granted');
        });
      }

      // 2. Init sync layer (restores file handle from IndexedDB)
      if (window.LIFEOS_SYNC) {
        const syncInfo = await window.LIFEOS_SYNC.init();
        setSyncStatus({
          fileConfigured: syncInfo.fileConfigured,
          gistConfigured: syncInfo.gistConfigured,
        });
      }

      // 3. Init DB — seeds defaults on first run, loads from DB on subsequent runs
      const loaded = await window.LIFEOS_DB.init(D);

      // 4. If IndexedDB was empty (fresh install after Clear Site Data), try
      //    restoring from file or Gist before falling back to demo data.
      let finalData = { categories: loaded.categories, blocks: loaded.blocks, allDay: loaded.allDay };

      if (loaded.isFirstRun && window.LIFEOS_SYNC) {
        // Try file first
        const fromFile = await window.LIFEOS_SYNC.loadFromFile();
        if (fromFile && (fromFile.blocks || fromFile.WEEK_BLOCKS)) {
          console.log('[LIFEOS] Restored from file after fresh install');
          await window.LIFEOS_DB.importJSON(JSON.stringify(fromFile));
          const reloaded = await window.LIFEOS_DB.loadAll();
          finalData = reloaded;
        } else {
          // Try Gist
          const fromGist = await window.LIFEOS_SYNC.loadFromGist();
          if (fromGist && (fromGist.blocks || fromGist.WEEK_BLOCKS)) {
            console.log('[LIFEOS] Restored from Gist after fresh install');
            await window.LIFEOS_DB.importJSON(JSON.stringify(fromGist));
            const reloaded = await window.LIFEOS_DB.loadAll();
            finalData = reloaded;
          }
        }
      }

      // 5. Splice data into shared globals (for components still reading from DATA.*)
      applyToGlobals(finalData);

      // 6. Update React state → triggers re-render with live data
      setData({ ...finalData });
      setLoading(false);
    }

    // 7. Register for future DB changes (QuickAdd, checklist toggles, etc.)
    window.LIFEOS_DB.onDataChange((updatedData) => {
      applyToGlobals(updatedData);
      setData({ ...updatedData });
    });

    init().catch(err => {
      console.error('[LIFEOS] Init failed:', err);
      // Fallback: render with hardcoded defaults
      setLoading(false);
    });
  }, []);

  // ── UI state ───────────────────────────────────────────────────────────────
  const [view, setView] = useStateA('day');
  const [selectedDay, setSelectedDay] = useStateA(V.NOW.day);
  const [openBlock, setOpenBlock] = useStateA(null);
  const [searchOpen, setSearchOpen] = useStateA(false);
  const [quickOpen, setQuickOpen] = useStateA(false);
  const [overviewOpen, setOverviewOpen] = useStateA(false);
  const [openCatProfile, setOpenCatProfile] = useStateA(null);

  // ── Tweaks ─────────────────────────────────────────────────────────────────
  const [t, setTweakRaw] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const setTweak = setTweakRaw;

  useEffectA(() => {
    document.body.setAttribute('data-palette', t.palette || 'pastels');
    document.body.setAttribute('data-theme',   t.theme   || 'light');
    document.body.setAttribute('data-density', t.density || 'cozy');
  }, [t.palette, t.theme, t.density]);

  // ── Category filter — persisted in localStorage ────────────────────────────
  const [catFilters, setCatFiltersRaw] = useStateA(() => {
    try {
      const saved = localStorage.getItem('lifeos_catFilters');
      if (saved) return new Set(JSON.parse(saved));
    } catch(e) {}
    return new Set(D.CATEGORIES.map(c => c.id));
  });

  const setCatFilters = useCallbackA((next) => {
    setCatFiltersRaw(next);
    try { localStorage.setItem('lifeos_catFilters', JSON.stringify([...next])); } catch(e) {}
  }, []);

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  useEffectA(() => {
    const onKey = (e) => {
      if (e.metaKey || e.ctrlKey) {
        if (e.key.toLowerCase() === 'k') { e.preventDefault(); setQuickOpen(true); }
        if (e.key.toLowerCase() === 'f') { e.preventDefault(); setSearchOpen(true); }
      }
      if (!e.metaKey && !e.ctrlKey) {
        if (e.key === 'd' || e.key === 'D') setView('day');
        if (e.key === 'w' || e.key === 'W') setView('week');
        if (e.key === '/') { e.preventDefault(); setSearchOpen(true); }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // ── Loading screen ─────────────────────────────────────────────────────────
  if (loading) return <LoadingScreen />;

  // ── Derived data ───────────────────────────────────────────────────────────
  const { blocks, categories, allDay } = data;

  const visibleBlocks = useMemoA(
    () => blocks.filter(b => catFilters.has(b.cat)),
    [blocks, catFilters]
  );

  const dayBlocks = useMemoA(
    () => visibleBlocks.filter(b => b.day === selectedDay),
    [visibleBlocks, selectedDay]
  );

  const dayAllDay = useMemoA(
    () => allDay.filter(a => a.day === selectedDay),
    [allDay, selectedDay]
  );

  const date = V.WEEK_DATES[selectedDay];

  return (
    <>
      {/* ============ TOP BAR ============ */}
      <header className="topbar">
        <div className="brand">
          <span className="brand-dot"/>
          LIFEOS
        </div>
        <div style={{ width: 1, height: 18, background: 'var(--hairline)', margin: '0 8px' }}/>
        <div className="crumbs">
          <b>{V.MONTHS_RU[4]}</b> · 2026 · {V.DOW_FULL[selectedDay]}, {date}
        </div>
        <div className="topbar-spacer"/>

        {/* Sync status indicator */}
        {syncStatus.fileConfigured || syncStatus.gistConfigured ? (
          <div style={{
            fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)',
            letterSpacing: '0.06em', display: 'flex', alignItems: 'center', gap: 4,
          }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#34c759' }}/>
            {syncStatus.fileConfigured && syncStatus.gistConfigured ? 'файл + gist' : syncStatus.fileConfigured ? 'файл' : 'gist'}
          </div>
        ) : (
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.06em', opacity: 0.6 }}>
            только IndexedDB
          </div>
        )}

        <div className="pill-group" style={{ marginLeft: 8 }}>
          <button aria-pressed={view === 'day'}   onClick={() => setView('day')}>День</button>
          <button aria-pressed={view === 'week'}  onClick={() => setView('week')}>Неделя</button>
          <button aria-pressed={view === 'month'} onClick={() => {/* not implemented yet */}}>Месяц</button>
        </div>

        <button className="icon-btn" title="Поиск (⌘F)" onClick={() => setSearchOpen(true)}>
          <V.Icon name="search" size={16}/>
        </button>
        <button className="icon-btn primary" title="Добавить (⌘K)" onClick={() => setQuickOpen(true)}>
          <V.Icon name="plus" size={18}/>
        </button>
      </header>

      {/* ============ MAIN GRID ============ */}
      <div className="main">
        {t.showSidebar && (
          <V.Sidebar
            blocks={visibleBlocks}
            categories={categories}
            catFilters={catFilters}
            setCatFilters={setCatFilters}
            selectedDay={selectedDay}
            setSelectedDay={setSelectedDay}
            onOpenCategory={setOpenCatProfile}
          />
        )}

        <main className="canvas">
          <div className="canvas-header">
            <div>
              <h1 className="canvas-title">
                {view === 'day' ? (
                  <>
                    <span>{date} {V.MONTHS_RU_GEN[4]}</span>
                    <span className="year-mono">— {V.DOW_FULL[selectedDay].toLowerCase()}</span>
                  </>
                ) : (
                  <>
                    <span>Май <span style={{ color: 'var(--ink-3)' }}>18–24</span></span>
                    <span className="year-mono">— нед. 21 · 2026</span>
                  </>
                )}
              </h1>
              <div className="canvas-subtitle">
                {view === 'day'
                  ? `${dayBlocks.length} тайм-блоков · план дня`
                  : `7 дней · ${visibleBlocks.length} событий`}
              </div>
            </div>

            <V.DailySummary dayIndex={selectedDay} onOpenOverview={() => setOverviewOpen(true)}/>
          </div>

          {view === 'day' ? (
            <V.DayView
              blocks={dayBlocks}
              allDayItems={dayAllDay}
              dayIndex={selectedDay}
              onOpenBlock={(b) => setOpenBlock(b)}
            />
          ) : (
            <V.WeekView
              blocks={visibleBlocks}
              onOpenBlock={(b) => setOpenBlock(b)}
              density={t.density}
              onSelectDay={(d) => { setSelectedDay(d); setView('day'); }}
            />
          )}

          <button className="fab" title="Quick Add · ⌘K" onClick={() => setQuickOpen(true)}>
            <V.Icon name="plus" size={22}/>
          </button>
        </main>
      </div>

      {/* ============ OVERLAYS ============ */}
      {openBlock && (
        <O.BlockOverlay block={openBlock} onClose={() => setOpenBlock(null)} />
      )}
      {openCatProfile && (
        <O.CategoryProfileDirect catId={openCatProfile} onClose={() => setOpenCatProfile(null)} />
      )}
      {searchOpen && (
        <O.SearchModal
          onClose={() => setSearchOpen(false)}
          onOpenBlock={(b) => setOpenBlock(b)}
          onOpenCategory={setOpenCatProfile}
        />
      )}
      {quickOpen && (
        <O.QuickAdd
          currentDay={selectedDay}
          onClose={() => setQuickOpen(false)}
          onBlockSaved={() => {/* data update comes via LIFEOS_DB.onDataChange */}}
        />
      )}
      {overviewOpen && (
        <O.DayOverview
          dayIndex={selectedDay}
          onClose={() => setOverviewOpen(false)}
          onOpenBlock={(b) => setOpenBlock(b)}
        />
      )}

      {/* ============ TWEAKS PANEL ============ */}
      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="Палитра & тема">
            <window.TweakRadio
              label="Тема"
              value={t.theme}
              options={[{ label: 'Light', value: 'light' }, { label: 'Dark', value: 'dark' }]}
              onChange={(v) => setTweak('theme', v)}
            />
            <window.TweakRadio
              label="Палитра"
              value={t.palette}
              options={[
                { label: 'Pastels', value: 'pastels' },
                { label: 'Earthy',  value: 'earthy'  },
                { label: 'Jewel',   value: 'jewel'   },
              ]}
              onChange={(v) => setTweak('palette', v)}
            />
          </window.TweakSection>

          <window.TweakSection label="Плотность">
            <window.TweakRadio
              label="Блоки"
              value={t.density}
              options={[
                { label: 'Compact', value: 'compact' },
                { label: 'Cozy',    value: 'cozy'    },
                { label: 'Airy',    value: 'airy'    },
              ]}
              onChange={(v) => setTweak('density', v)}
            />
            <window.TweakToggle
              label="Боковая панель"
              value={!!t.showSidebar}
              onChange={(v) => setTweak('showSidebar', v)}
            />
          </window.TweakSection>

          <window.TweakSection label="Палитра · превью">
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
              {categories.map(c => (
                <div key={c.id} style={{ ...D.tintStyle(c.id), background: 'oklch(var(--tint))', borderRadius: 8, padding: 8, position: 'relative', overflow: 'hidden' }}>
                  <div style={{ width: 3, position: 'absolute', left: 0, top: 0, bottom: 0, background: 'oklch(var(--tint-bar))' }}/>
                  <div style={{ fontSize: 10, fontFamily: 'var(--font-mono)', letterSpacing: '0.06em', color: 'oklch(var(--tint-ink))', textTransform: 'uppercase' }}>{c.nameRu}</div>
                </div>
              ))}
            </div>
          </window.TweakSection>

          {/* ── Storage settings ── */}
          <StorageSettings syncStatus={syncStatus} onSyncStatusChange={refreshSyncStatus} />

        </window.TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);

</script>
</body>
</html>
