<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f8f6f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#2e2b26" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="LIFEOS">
<link rel="manifest" href="manifest.json">
<title>LIFEOS — Умный календарь</title>

<!-- Geist Sans + Geist Mono via Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ========== LIFEOS — Design DNA ==========
   Light & calm. Beige-grey paper, soft tinted blocks, generous air.
   Type: Geist (sans) + Geist Mono (numerals/meta).
   Pill controls. 1px hairlines. No drop shadows except modal lift.
*/

:root {
  /* — Surfaces — */
  --bg: oklch(97.2% 0.004 80);          /* warm off-white paper */
  --bg-soft: oklch(95.5% 0.006 80);     /* card / well */
  --bg-elev: oklch(99% 0.003 80);       /* elevated chip / pill */
  --bg-overlay: oklch(20% 0.01 80 / 0.32);

  /* — Ink — */
  --ink: oklch(20% 0.012 70);           /* primary text */
  --ink-2: oklch(40% 0.012 70);         /* secondary */
  --ink-3: oklch(58% 0.010 70);         /* tertiary / meta */
  --ink-4: oklch(75% 0.008 70);         /* hairlines, ghost */

  --hairline: oklch(88% 0.006 70);
  --hairline-2: oklch(92% 0.005 70);

  --accent: oklch(58% 0.18 28);         /* signal red (today, urgent) */
  --accent-soft: oklch(94% 0.04 28);
  --link: oklch(48% 0.13 250);

  /* — Type scale — */
  --font-sans: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;

  /* — Geometry — */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 999px;

  --shadow-lift: 0 1px 2px rgba(40, 30, 20, 0.04), 0 8px 28px rgba(40, 30, 20, 0.07);
  --shadow-modal: 0 1px 2px rgba(40, 30, 20, 0.06), 0 24px 64px rgba(40, 30, 20, 0.14);

  /* — Motion — */
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-1: 160ms;
  --dur-2: 320ms;
  --dur-3: 520ms;
  --dur-4: 720ms;
}

/* ========== DARK THEME ========== */
[data-theme="dark"] {
  --bg: oklch(18% 0.008 70);
  --bg-soft: oklch(22% 0.010 70);
  --bg-elev: oklch(26% 0.012 70);
  --bg-overlay: oklch(8% 0.01 70 / 0.55);

  --ink: oklch(96% 0.005 80);
  --ink-2: oklch(78% 0.006 80);
  --ink-3: oklch(60% 0.008 80);
  --ink-4: oklch(40% 0.010 80);

  --hairline: oklch(32% 0.010 70);
  --hairline-2: oklch(28% 0.010 70);

  --accent: oklch(72% 0.16 28);
  --accent-soft: oklch(32% 0.06 28);

  --shadow-lift: 0 1px 2px rgba(0,0,0,0.5), 0 12px 32px rgba(0,0,0,0.35);
  --shadow-modal: 0 1px 2px rgba(0,0,0,0.6), 0 28px 72px rgba(0,0,0,0.5);
}

/* ========== CATEGORY PALETTES ==========
   Each category exposes: --tint (block bg), --tint-strong (active),
   --edge (left border bar), --on-tint (text on tinted block).
*/

/* Each palette defines, per category, 3 oklch triplets:
   --c-{cat}        : block background tint (light, low chroma)
   --c-{cat}-bar    : strong accent (left bar, dot, fill, progress)
   --c-{cat}-ink    : ink (text on tinted bg) — high contrast against --c-{cat}
*/

/* PASTELS — default (matches reference screenshots) */
[data-palette="pastels"] {
  --c-business:     90% 0.030 268;  --c-business-bar:     38% 0.13 268;   --c-business-ink:     28% 0.08 268;
  --c-health:       90% 0.040 25;   --c-health-bar:       50% 0.16 25;    --c-health-ink:       38% 0.10 25;
  --c-creative:     92% 0.045 90;   --c-creative-bar:     54% 0.12 85;    --c-creative-ink:     38% 0.08 80;
  --c-family:       89% 0.040 315;  --c-family-bar:       48% 0.13 315;   --c-family-ink:       34% 0.09 315;
  --c-learning:     92% 0.035 230;  --c-learning-bar:     48% 0.11 235;   --c-learning-ink:     34% 0.07 230;
  --c-work:         89% 0.045 145;  --c-work-bar:         48% 0.10 150;   --c-work-ink:         32% 0.07 150;
  --c-finance:      90% 0.045 60;   --c-finance-bar:      52% 0.13 55;    --c-finance-ink:      36% 0.09 55;
}

/* EARTHY — muted, terracotta + moss + ochre */
[data-palette="earthy"] {
  --c-business:     85% 0.035 250;  --c-business-bar:     42% 0.10 250;   --c-business-ink:     30% 0.07 250;
  --c-health:       86% 0.065 35;   --c-health-bar:       48% 0.14 35;    --c-health-ink:       34% 0.10 35;
  --c-creative:     88% 0.060 75;   --c-creative-bar:     50% 0.10 75;    --c-creative-ink:     35% 0.08 75;
  --c-family:       85% 0.045 340;  --c-family-bar:       45% 0.10 340;   --c-family-ink:       32% 0.08 340;
  --c-learning:     87% 0.035 200;  --c-learning-bar:     46% 0.08 200;   --c-learning-ink:     32% 0.06 200;
  --c-work:         86% 0.055 140;  --c-work-bar:         44% 0.09 140;   --c-work-ink:         30% 0.06 140;
  --c-finance:      87% 0.050 50;   --c-finance-bar:      48% 0.10 50;    --c-finance-ink:      34% 0.07 50;
}

/* JEWEL — saturated, modern */
[data-palette="jewel"] {
  --c-business:     85% 0.060 260;  --c-business-bar:     45% 0.18 260;   --c-business-ink:     30% 0.12 260;
  --c-health:       84% 0.075 25;   --c-health-bar:       55% 0.20 25;    --c-health-ink:       36% 0.14 25;
  --c-creative:     86% 0.075 80;   --c-creative-bar:     56% 0.16 80;    --c-creative-ink:     38% 0.10 80;
  --c-family:       86% 0.065 320;  --c-family-bar:       50% 0.18 320;   --c-family-ink:       34% 0.12 320;
  --c-learning:     86% 0.055 210;  --c-learning-bar:     48% 0.15 210;   --c-learning-ink:     32% 0.10 210;
  --c-work:         84% 0.070 150;  --c-work-bar:         48% 0.14 150;   --c-work-ink:         32% 0.10 150;
  --c-finance:      86% 0.080 50;   --c-finance-bar:      54% 0.15 50;    --c-finance-ink:      38% 0.10 50;
}

/* DARK theme: invert tint logic — bg darker, ink lighter */
[data-theme="dark"][data-palette="pastels"] {
  --c-business:     32% 0.040 268;  --c-business-bar:     72% 0.14 268;   --c-business-ink:     86% 0.05 268;
  --c-health:       34% 0.060 25;   --c-health-bar:       76% 0.14 25;    --c-health-ink:       88% 0.06 25;
  --c-creative:     34% 0.055 85;   --c-creative-bar:     80% 0.13 80;    --c-creative-ink:     90% 0.06 80;
  --c-family:       32% 0.055 315;  --c-family-bar:       76% 0.13 315;   --c-family-ink:       88% 0.06 315;
  --c-learning:     32% 0.045 230;  --c-learning-bar:     74% 0.12 230;   --c-learning-ink:     88% 0.05 230;
  --c-work:         30% 0.050 145;  --c-work-bar:         74% 0.12 150;   --c-work-ink:         88% 0.05 145;
  --c-finance:      34% 0.055 55;   --c-finance-bar:      78% 0.13 55;    --c-finance-ink:      88% 0.06 55;
}
[data-theme="dark"][data-palette="earthy"] {
  --c-business:     30% 0.035 250;  --c-business-bar:     72% 0.10 250;   --c-business-ink:     86% 0.05 250;
  --c-health:       34% 0.070 35;   --c-health-bar:       76% 0.14 35;    --c-health-ink:       88% 0.06 35;
  --c-creative:     34% 0.060 75;   --c-creative-bar:     78% 0.11 75;    --c-creative-ink:     90% 0.05 75;
  --c-family:       32% 0.050 340;  --c-family-bar:       74% 0.12 340;   --c-family-ink:       88% 0.06 340;
  --c-learning:     30% 0.040 200;  --c-learning-bar:     72% 0.10 200;   --c-learning-ink:     88% 0.05 200;
  --c-work:         30% 0.050 140;  --c-work-bar:         72% 0.10 140;   --c-work-ink:         88% 0.05 140;
  --c-finance:      34% 0.060 50;   --c-finance-bar:      76% 0.12 50;    --c-finance-ink:      88% 0.06 50;
}
[data-theme="dark"][data-palette="jewel"] {
  --c-business:     30% 0.060 260;  --c-business-bar:     75% 0.18 260;   --c-business-ink:     90% 0.10 260;
  --c-health:       32% 0.080 25;   --c-health-bar:       78% 0.20 25;    --c-health-ink:       92% 0.10 25;
  --c-creative:     32% 0.075 80;   --c-creative-bar:     82% 0.16 80;    --c-creative-ink:     92% 0.10 80;
  --c-family:       30% 0.070 320;  --c-family-bar:       78% 0.18 320;   --c-family-ink:       92% 0.10 320;
  --c-learning:     30% 0.060 210;  --c-learning-bar:     74% 0.15 210;   --c-learning-ink:     92% 0.09 210;
  --c-work:         30% 0.065 150;  --c-work-bar:         74% 0.14 150;   --c-work-ink:         92% 0.09 150;
  --c-finance:      32% 0.080 50;   --c-finance-bar:      80% 0.15 50;    --c-finance-ink:      92% 0.10 50;
}

/* ========== RESET ========== */
*,*::before,*::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-feature-settings: 'ss01', 'cv11';
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
  overflow: hidden;
}
button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; letter-spacing: inherit; }
input, textarea { font: inherit; color: inherit; background: none; border: 0; padding: 0; }
input:focus, textarea:focus, button:focus { outline: none; }
svg { display: block; }

/* ========== APP SHELL ========== */
#app {
  position: fixed; inset: 0;
  display: grid;
  grid-template-rows: auto 1fr;
  background: var(--bg);
}

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 28px 12px;
  border-bottom: 1px solid var(--hairline);
  background: var(--bg);
  position: relative;
  z-index: 5;
}
.brand {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  display: flex; align-items: center; gap: 10px;
}
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.crumbs {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.crumbs b { color: var(--ink); font-weight: 500; }

.topbar-spacer { flex: 1; }

.pill-group {
  display: flex; align-items: center;
  background: var(--bg-soft);
  border-radius: var(--r-pill);
  padding: 4px;
  border: 1px solid var(--hairline);
}
.pill-group button {
  padding: 7px 14px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  transition: color var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
}
.pill-group button:hover { color: var(--ink); }
.pill-group button[aria-pressed="true"] {
  background: var(--bg-elev);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

.icon-btn {
  width: 38px; height: 38px;
  display: grid; place-items: center;
  border-radius: var(--r-pill);
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  color: var(--ink);
  transition: background var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}
.icon-btn:hover { background: var(--bg-elev); }
.icon-btn:active { transform: scale(0.96); }
.icon-btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
[data-theme="dark"] .icon-btn.primary { background: var(--ink); color: var(--bg); }

/* ========== MAIN GRID ========== */
.main {
  display: grid;
  grid-template-columns: 260px 1fr;
  overflow: hidden;
  min-height: 0;
}

@media (max-width: 880px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ========== SIDEBAR ========== */
.sidebar {
  border-right: 1px solid var(--hairline);
  padding: 22px 18px;
  display: flex; flex-direction: column;
  gap: 22px;
  overflow-y: auto;
  background: var(--bg);
}

.side-section-title {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 0 0 8px 6px;
}

.mini-month {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  font-family: var(--font-mono);
  font-size: 11px;
}
.mini-month .dow {
  text-align: center;
  color: var(--ink-3);
  font-size: 10px;
  padding: 4px 0 6px;
}
.mini-month .day {
  aspect-ratio: 1;
  display: grid; place-items: center;
  border-radius: var(--r-pill);
  color: var(--ink-2);
  cursor: pointer;
  font-size: 11.5px;
  transition: background var(--dur-1) var(--ease);
}
.mini-month .day.dim { color: var(--ink-4); }
.mini-month .day:hover { background: var(--bg-soft); }
.mini-month .day.sel {
  background: var(--ink);
  color: var(--bg);
}
.mini-month .day.today { color: var(--accent); font-weight: 600; }
.mini-month .day.today.sel { background: var(--accent); color: white; }

.cat-list {
  display: flex; flex-direction: column;
  gap: 2px;
}
.cat-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background var(--dur-1) var(--ease);
  font-size: 13.5px;
  color: var(--ink);
}
.cat-row:hover { background: var(--bg-soft); }
.cat-dot {
  width: 11px; height: 11px;
  border-radius: 3.5px;
  background: oklch(var(--tint-bar));
  flex-shrink: 0;
  position: relative;
}
.cat-row.muted .cat-dot { background: var(--bg-elev); border: 1px solid var(--hairline); }
.cat-row.muted { color: var(--ink-3); }
.cat-row .cat-count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

/* ========== CANVAS / VIEWPORT ========== */
.canvas {
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
  min-width: 0;
}

.canvas-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 24px 28px 14px;
  gap: 24px;
  border-bottom: 1px solid var(--hairline);
}
.canvas-title {
  margin: 0;
  font-size: 56px;
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 0.95;
  display: flex; align-items: baseline; gap: 14px;
}
.canvas-title .year-mono {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.canvas-subtitle {
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--ink-3);
  letter-spacing: 0.03em;
  margin-top: 6px;
}

/* Summary chips */
.summary {
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap;
}
.sum-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px 8px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  border-radius: var(--r-pill);
  font-size: 13px;
  color: var(--ink);
  transition: all var(--dur-1) var(--ease);
  cursor: pointer;
}
.sum-chip:hover { background: var(--bg-elev); transform: translateY(-1px); }
.sum-chip b { font-weight: 600; font-feature-settings: 'tnum'; }
.sum-chip .sum-num {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  background: var(--bg-elev);
  padding: 2px 7px;
  border-radius: var(--r-pill);
  border: 1px solid var(--hairline);
}
.sum-chip.alert { border-color: oklch(85% 0.12 28); color: oklch(45% 0.15 28); background: oklch(97% 0.03 28); }
[data-theme="dark"] .sum-chip.alert { background: oklch(28% 0.06 28); border-color: oklch(40% 0.10 28); color: oklch(85% 0.10 28); }
.sum-chip.alert .sum-num { background: oklch(92% 0.07 28); border-color: oklch(85% 0.12 28); color: oklch(40% 0.18 28); }

/* ========== DAY VIEW ========== */
.dayview {
  flex: 1;
  display: grid;
  grid-template-columns: 64px 1fr;
  overflow-y: auto;
  scroll-behavior: smooth;
  position: relative;
}

.hours-gutter {
  border-right: 1px solid var(--hairline);
  position: relative;
}
.hour-label {
  position: absolute;
  right: 12px;
  top: 0;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}

.day-canvas {
  position: relative;
}
.day-grid-line {
  position: absolute;
  left: 0; right: 0;
  border-top: 1px solid var(--hairline-2);
}
.day-grid-line.half { border-top-style: dashed; opacity: 0.5; }

.now-bar {
  position: absolute;
  left: -8px; right: 0;
  height: 0;
  border-top: 1.5px solid var(--accent);
  z-index: 6;
  pointer-events: none;
}
.now-bar::before {
  content: '';
  position: absolute; left: -4px; top: -5px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent);
}
.now-bar .now-label {
  position: absolute;
  left: -56px; top: -10px;
  background: var(--accent);
  color: white;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: var(--r-pill);
  letter-spacing: 0.02em;
}

/* ========== TIME BLOCK ========== */
.block {
  position: absolute;
  left: 12px; right: 16px;
  border-radius: var(--r-md);
  padding: 10px 12px;
  cursor: pointer;
  overflow: hidden;
  background: oklch(var(--tint));
  border: 1px solid oklch(var(--tint-edge) / 0.4);
  transition: transform var(--dur-2) var(--ease), box-shadow var(--dur-2) var(--ease);
  will-change: transform;
  min-height: 28px;
  display: flex; flex-direction: column;
  gap: 4px;
}
.block::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: oklch(var(--tint-bar));
  border-top-left-radius: var(--r-md);
  border-bottom-left-radius: var(--r-md);
}
.block:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lift);
  z-index: 4;
}
.block-title {
  font-size: 13.5px;
  font-weight: 600;
  color: oklch(var(--tint-ink));
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: oklch(var(--tint-ink) / 0.7);
  letter-spacing: 0.02em;
  display: flex; align-items: center; gap: 6px;
}
.block-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  color: oklch(var(--tint-ink) / 0.65);
  margin-top: auto;
}
.block-meta .recur {
  width: 12px; height: 12px;
  display: inline-grid; place-items: center;
}
.block.compact { padding: 6px 10px; }
.block.compact .block-time { display: none; }

.allday-row {
  display: flex; gap: 6px;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--hairline);
  overflow-x: auto;
  background: var(--bg);
  scrollbar-width: none;
}
.allday-row::-webkit-scrollbar { display: none; }
.allday-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  background: oklch(var(--tint));
  color: oklch(var(--tint-ink));
  border: 1px solid oklch(var(--tint-edge) / 0.3);
  transition: transform var(--dur-1) var(--ease);
}
.allday-chip:hover { transform: translateY(-1px); }

/* ========== WEEK VIEW ========== */
.weekview {
  flex: 1;
  display: grid;
  grid-template-columns: 56px 1fr;
  overflow: hidden;
}
.weekview .hours-gutter { padding-top: 88px; }
.weekgrid {
  display: grid;
  grid-template-rows: 88px 1fr;
}
.week-heads {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--hairline);
}
.week-head {
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 4px;
  border-right: 1px solid var(--hairline-2);
  cursor: pointer;
  transition: background var(--dur-1) var(--ease);
}
.week-head:last-child { border-right: 0; }
.week-head:hover { background: var(--bg-soft); }
.week-head .dow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.week-head .dom {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.week-head.today .dom {
  display: inline-grid; place-items: center;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
}
.week-head .density-bar {
  margin-top: 4px;
  height: 3px;
  border-radius: 2px;
  background: var(--hairline);
  overflow: hidden;
  display: flex;
}
.density-bar > span { height: 100%; background: oklch(var(--seg)); flex: 1 1 auto; }

.week-cols {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  overflow-y: auto;
  position: relative;
}
.week-col {
  border-right: 1px solid var(--hairline-2);
  position: relative;
  min-height: 100%;
}
.week-col:last-child { border-right: 0; }
.week-col.today {
  background: linear-gradient(180deg, oklch(96% 0.02 28 / 0.4), transparent 200px);
}
[data-theme="dark"] .week-col.today {
  background: linear-gradient(180deg, oklch(35% 0.05 28 / 0.3), transparent 200px);
}

.week-col .block { left: 4px; right: 4px; padding: 6px 8px; }
.week-col .block .block-time { font-size: 10px; }
.week-col .block .block-title { font-size: 12.5px; }

/* ========== OVERLAYS ========== */
.scrim {
  position: fixed; inset: 0;
  background: var(--bg-overlay);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 50;
  opacity: 0;
  animation: scrim-in var(--dur-2) var(--ease) forwards;
}
@keyframes scrim-in { to { opacity: 1; } }

.l1-card {
  position: fixed;
  z-index: 60;
  background: var(--bg);
  border: 1px solid var(--hairline);
  box-shadow: var(--shadow-modal);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  transform-origin: top left;
}

.l1-header {
  padding: 22px 24px 18px;
  background: oklch(var(--tint));
  position: relative;
  border-bottom: 1px solid oklch(var(--tint-edge) / 0.3);
}
.l1-header::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: oklch(var(--tint-bar));
}
.l1-cat-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 11px;
  border-radius: var(--r-pill);
  background: oklch(var(--tint-bar) / 0.15);
  color: oklch(var(--tint-ink));
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  border: 1px solid oklch(var(--tint-edge) / 0.3);
  cursor: pointer;
  transition: transform var(--dur-1) var(--ease);
}
.l1-cat-badge:hover { transform: translateY(-1px); }
.l1-cat-badge .lb-dot { width: 7px; height: 7px; border-radius: 2px; background: oklch(var(--tint-bar)); }
.l1-title {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.025em;
  color: oklch(var(--tint-ink));
  margin: 14px 0 6px;
  line-height: 1.05;
}
.l1-time {
  font-family: var(--font-mono);
  font-size: 14px;
  color: oklch(var(--tint-ink) / 0.8);
  letter-spacing: 0.02em;
  display: flex; align-items: center; gap: 10px;
}
.l1-close {
  position: absolute;
  right: 16px; top: 16px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: oklch(var(--tint-ink) / 0.08);
  display: grid; place-items: center;
  color: oklch(var(--tint-ink));
  transition: background var(--dur-1) var(--ease);
}
.l1-close:hover { background: oklch(var(--tint-ink) / 0.15); }

.l1-body {
  padding: 18px 24px 22px;
  display: flex; flex-direction: column;
  gap: 14px;
  overflow-y: auto;
}
.l1-section {
  display: flex; flex-direction: column; gap: 8px;
}
.l1-row {
  display: flex; gap: 14px;
  align-items: flex-start;
  padding: 12px 0;
  border-bottom: 1px solid var(--hairline-2);
}
.l1-row:last-child { border-bottom: 0; }
.l1-label {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  flex-shrink: 0;
  width: 90px;
  padding-top: 2px;
}
.l1-val { flex: 1; font-size: 14.5px; color: var(--ink); line-height: 1.5; }
.l1-val.muted { color: var(--ink-2); }

.checklist { display: flex; flex-direction: column; gap: 8px; }
.check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 6px 0;
  cursor: pointer;
}
.check-box {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--ink-4);
  display: grid; place-items: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all var(--dur-1) var(--ease);
}
.check-item.done .check-box {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.check-item.done .check-text {
  color: var(--ink-3);
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}
.check-text { font-size: 14px; }

.l1-context-cta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}
.l1-context-cta:hover { background: var(--bg-elev); }
.l1-context-cta .label-mono {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 4px;
}
.l1-context-cta .cta-title {
  font-size: 15.5px;
  font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.l1-context-cta .cta-arrow {
  font-family: var(--font-mono);
  color: var(--ink-3);
  font-size: 18px;
  transition: transform var(--dur-2) var(--ease);
}
.l1-context-cta:hover .cta-arrow { transform: translateX(4px); }

/* ========== L2 PROFILE (signature: physically expands from L1) ========== */

/* The card itself animates via inline style via FLIP technique */
.l2-card {
  position: fixed;
  z-index: 70;
  background: var(--bg);
  overflow: hidden;
  display: flex; flex-direction: column;
  transform-origin: top left;
}

.l2-card.expanding {
  /* animation handled inline */
}

.l2-hero {
  background: oklch(var(--tint));
  padding: 36px 48px 28px;
  position: relative;
  flex-shrink: 0;
}
.l2-hero::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 6px;
  background: oklch(var(--tint-bar));
}
.l2-back {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px 8px 10px;
  background: oklch(var(--tint-ink) / 0.06);
  border-radius: var(--r-pill);
  color: oklch(var(--tint-ink));
  font-size: 13px;
  font-weight: 500;
  transition: background var(--dur-1) var(--ease);
}
.l2-back:hover { background: oklch(var(--tint-ink) / 0.12); }
.l2-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.l2-actions { display: flex; gap: 8px; }
.l2-actions .icon-btn { background: oklch(var(--tint-ink) / 0.06); border-color: transparent; color: oklch(var(--tint-ink)); }
.l2-actions .icon-btn:hover { background: oklch(var(--tint-ink) / 0.12); }

.l2-cat-line {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: oklch(var(--tint-ink) / 0.7);
  margin-bottom: 16px;
}
.l2-cat-line .lc-dot { width: 9px; height: 9px; border-radius: 3px; background: oklch(var(--tint-bar)); }

.l2-title {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 0.95;
  color: oklch(var(--tint-ink));
  margin: 0;
  display: flex; align-items: baseline; flex-wrap: wrap; gap: 16px;
}
.l2-title-sub {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.02em;
  color: oklch(var(--tint-ink) / 0.7);
  font-weight: 400;
}
.l2-tagline {
  font-size: 17px;
  color: oklch(var(--tint-ink) / 0.8);
  max-width: 60ch;
  line-height: 1.5;
  margin-top: 18px;
}

.l2-stats {
  display: flex; gap: 24px;
  margin-top: 24px;
  padding-top: 22px;
  border-top: 1px solid oklch(var(--tint-edge) / 0.4);
}
.l2-stat .num {
  font-size: 28px;
  font-weight: 600;
  font-feature-settings: 'tnum';
  letter-spacing: -0.02em;
  color: oklch(var(--tint-ink));
  display: block;
  line-height: 1.1;
}
.l2-stat .lbl {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: oklch(var(--tint-ink) / 0.65);
  margin-top: 2px;
}

.l2-body {
  flex: 1; overflow-y: auto;
  padding: 32px 48px 60px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 36px 48px;
  align-content: start;
}
@media (max-width: 880px) { .l2-body { grid-template-columns: 1fr; padding: 24px 24px 40px; } .l2-hero { padding: 24px 24px 22px; } .l2-title { font-size: 48px; } }

.l2-block {
  display: flex; flex-direction: column; gap: 16px;
}
.l2-block.full { grid-column: 1 / -1; }

.l2-block-head {
  display: flex; align-items: baseline; justify-content: space-between;
  border-bottom: 1px solid var(--hairline);
  padding-bottom: 10px;
}
.l2-block-head h3 {
  font-size: 13px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  font-weight: 500;
  margin: 0;
}
.l2-block-head .count-mono {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

.goal-item {
  padding: 14px 16px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  display: flex; flex-direction: column; gap: 8px;
  transition: background var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
  cursor: pointer;
}
.goal-item:hover { background: var(--bg-elev); transform: translateY(-1px); }
.goal-row1 {
  display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
}
.goal-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.goal-due {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.goal-progress {
  height: 4px;
  background: var(--hairline);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.goal-progress > span {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: oklch(var(--tint-bar));
  border-radius: 2px;
  transition: width var(--dur-3) var(--ease);
}
.goal-meta {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}

.notes-card {
  padding: 18px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-2);
  white-space: pre-wrap;
}

.linked-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.link-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--dur-1) var(--ease);
}
.link-pill:hover { background: var(--bg-elev); transform: translateY(-1px); }
.link-pill .lp-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: oklch(var(--tint-bar) / 0.15);
  display: grid; place-items: center;
  color: oklch(var(--tint-bar));
  flex-shrink: 0;
}
.link-pill .lp-meta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  margin-left: auto;
}

.history-strip {
  display: flex; gap: 4px;
  align-items: flex-end;
  height: 56px;
  padding: 8px 0;
}
.hs-bar {
  flex: 1;
  background: oklch(var(--tint-bar) / 0.2);
  border-radius: 3px 3px 0 0;
  min-height: 4px;
  position: relative;
  transition: background var(--dur-1) var(--ease);
}
.hs-bar.active { background: oklch(var(--tint-bar)); }
.hs-bar:hover { background: oklch(var(--tint-bar) / 0.8); }
.hs-labels {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  text-transform: uppercase;
}

/* ========== QUICK ADD / SEARCH SHEETS ========== */
.sheet {
  position: fixed;
  z-index: 65;
  background: var(--bg);
  border: 1px solid var(--hairline);
  box-shadow: var(--shadow-modal);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
}

.search-input-row {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 22px;
  border-bottom: 1px solid var(--hairline);
}
.search-input {
  flex: 1;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.search-input::placeholder { color: var(--ink-4); }
.search-kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  padding: 3px 8px;
  background: var(--bg-soft);
  border-radius: var(--r-xs);
  border: 1px solid var(--hairline);
}

.search-results {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
}
.search-group-title {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 16px 22px 6px;
}
.search-row {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 22px;
  cursor: pointer;
  transition: background var(--dur-1) var(--ease);
}
.search-row:hover, .search-row.active { background: var(--bg-soft); }
.search-row .sr-icon {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  background: oklch(var(--tint-bar) / 0.18);
  color: oklch(var(--tint-bar));
  display: grid; place-items: center;
  flex-shrink: 0;
}
.search-row .sr-main { flex: 1; min-width: 0; }
.search-row .sr-title { font-size: 14.5px; font-weight: 500; }
.search-row .sr-sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.02em; }
.search-row .sr-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
}

/* Quick Add */
.qa-tabs {
  display: flex; gap: 4px;
  padding: 4px;
  background: var(--bg-soft);
  border-radius: var(--r-pill);
  border: 1px solid var(--hairline);
  margin: 18px 22px 8px;
}
.qa-tabs button {
  flex: 1;
  padding: 8px 14px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  transition: all var(--dur-1) var(--ease);
}
.qa-tabs button[aria-pressed="true"] {
  background: var(--bg);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.qa-form { padding: 16px 22px 22px; display: flex; flex-direction: column; gap: 14px; }
.qa-title-input {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  padding: 8px 0;
  border-bottom: 1px solid var(--hairline);
  width: 100%;
}
.qa-title-input::placeholder { color: var(--ink-4); }

.qa-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.qa-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--bg-soft);
  border: 1px solid var(--hairline);
  border-radius: var(--r-pill);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--dur-1) var(--ease);
}
.qa-chip:hover { background: var(--bg-elev); }
.qa-chip .qc-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
.qa-chip[aria-pressed="true"] {
  background: var(--ink);
  color: var(--bg);
}
.qa-chip[aria-pressed="true"] .qc-label { color: var(--ink-4); }

.qa-cat-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.qa-cat-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 8px;
  border-radius: var(--r-pill);
  background: oklch(var(--tint));
  color: oklch(var(--tint-ink));
  border: 1px solid oklch(var(--tint-edge) / 0.3);
  font-size: 12.5px; font-weight: 500;
  cursor: pointer;
  transition: all var(--dur-1) var(--ease);
}
.qa-cat-chip[aria-pressed="true"] { box-shadow: 0 0 0 2px oklch(var(--tint-bar)) inset, 0 0 0 4px var(--bg) inset; padding-left: 10px; }
.qa-cat-chip .qcc-dot { width: 9px; height: 9px; border-radius: 3px; background: oklch(var(--tint-bar)); }

.qa-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
.btn {
  padding: 10px 18px;
  border-radius: var(--r-pill);
  font-size: 13.5px; font-weight: 500;
  cursor: pointer;
  transition: all var(--dur-1) var(--ease);
}
.btn.ghost { color: var(--ink-2); }
.btn.ghost:hover { background: var(--bg-soft); }
.btn.solid { background: var(--ink); color: var(--bg); }
.btn.solid:hover { transform: translateY(-1px); }

/* ========== FAB ========== */
.fab {
  position: absolute;
  right: 28px; bottom: 28px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 8px 32px rgba(0,0,0,0.10);
  cursor: pointer;
  z-index: 8;
  transition: transform var(--dur-2) var(--ease);
}
.fab:hover { transform: translateY(-2px) scale(1.04); }
.fab:active { transform: scale(0.96); }

/* ========== ANIMATIONS ========== */
@keyframes l1-in {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes pop-in {
  from { opacity: 0; transform: scale(0.98) translateY(4px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.l1-card.entering { animation: l1-in var(--dur-2) var(--ease) forwards; }
.sheet.entering { animation: pop-in var(--dur-2) var(--ease) forwards; }

/* tweaks toggle button (host injects a toolbar item) */
.tweaks-fab { display: none; }

/* scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 10px; border: 2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }
*::-webkit-scrollbar-track { background: transparent; }

/* layout density variants */

[data-density="compact"] .block-time { font-size: 10px; }

/* ============================================================
   MOBILE RESPONSIVE SYSTEM
   Breakpoints:
     ≤389px  — small phones  (320–390)
     ≤767px  — mobile        (390–767)
     768–1023 — tablet
     1024+    — desktop (unchanged)
   ============================================================ */

/* Safe-area tokens + bottom-nav height */
:root {
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left,   0px);
  --safe-r: env(safe-area-inset-right,  0px);
  --bn-h: 62px;
}

/* ---- Tablet 881–1023px ---- */
@media (min-width: 881px) and (max-width: 1023px) {
  .topbar { padding: 14px 20px 10px; }
  .canvas-title { font-size: 40px; }
  .main { grid-template-columns: 220px 1fr; }
  .sidebar { padding: 16px 14px; gap: 18px; }
  .icon-btn { width: 40px; height: 40px; }
  .l2-hero { padding: 28px 32px 22px; }
  .l2-title { font-size: 52px; }
}

/* ---- Mobile <768px ---- */
@media (max-width: 767px) {
  html { -webkit-tap-highlight-color: transparent; }

  /* hide all scrollbars */
  *::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }

  /* app shell — add bottom-nav row */
  #app { grid-template-rows: auto 1fr auto; }

  /* TopBar */
  .topbar {
    padding: 10px 16px 8px;
    padding-top: calc(10px + var(--safe-t));
    gap: 8px;
    min-height: 50px;
  }
  .topbar .pill-group { display: none; }
  .crumbs { display: none; }
  .topbar .icon-btn.primary { display: none; } /* FAB is the add CTA on mobile */
  .icon-btn { width: 44px; height: 44px; border-radius: 12px; }

  /* Main grid */
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none !important; }

  /* Canvas header */
  .canvas-header {
    padding: 12px 16px 8px;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;

  .canvas-title {

  /* Day view */
  .dayview { grid-template-columns: 44px 1fr; }
  .hour-label { font-size: 9.5px; right: 6px; }
  .block { min-height: 40px; border-radius: var(--r-sm); }
  .block-title { font-size: 12px; }

  .allday-row  { padding: 6px 8px 4px; }

  .week-col .block { left: 1px; right: 1px; padding: 3px 4px; }
  .week-col .block .block-title { font-size: 9.5px; }
  .week-col .block .block-time  { display: none; }

  /* FAB — fixed above bottom nav */
  .fab { position: fixed; right: 20px; bottom: calc(var(--bn-h) + var(--safe-b) + 12px); width: 52px; height: 52px; }

  /* L1 header */

  .l1-title  { font-size: 22px; margin: 10px 0 4px; }

  .l2-title  { font-size: clamp(26px, 8vw, 40px); gap: 8px; }

  .l2-stat .num { font-size: 22px; }
  .l2-body   { padding: 16px 16px 24px; gap: 20px 0; }
  .linked-grid { grid-template-columns: 1fr; }

  /* Search */
  .search-input-row { padding: 12px 16px; }
  .search-input { font-size: 16px; }
  .search-kbd { display: none; }
  .search-row { padding: 10px 16px; min-height: 48px; }
  .search-group-title { padding: 12px 16px 4px; }

  .qa-tabs button { padding: 8px 10px; font-size: 12px; min-height: 38px; }
  .qa-form { padding: 10px 16px 16px; gap: 12px; }
  .qa-title-input { font-size: 16px; }
  .qa-cat-chip { font-size: 12px; padding: 8px 10px 8px 7px; min-height: 36px; }
  .qa-actions { gap: 8px; }
  .qa-actions .btn { flex: 1; text-align: center; min-height: 44px; }

  .btn { min-height: 44px; padding: 12px 18px; font-size: 14px; }
  .cat-row { min-height: 44px; }
  .sum-chip { min-height: 40px; min-width: 44px; }

  /* Hide desktop-only elements */
  kbd { display: none; }
  .dbl-hint { display: none; }

  /* iOS: prevent auto-zoom on input focus */
  input, textarea, select { font-size: max(16px, 1em); }

  /* Overflow guard — allow summary chips to scroll inside canvas-header */
  .canvas, .canvas-header { max-width: 100vw; }
}

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<body data-palette="pastels" data-theme="light" data-density="cozy">
<div id="app"></div>

<!-- Storage layer (plain JS, no JSX) -->
<script>
/* LIFEOS — storage/db.js
 * IndexedDB layer via Dexie.js (loaded as UMD global before Babel scripts).
 * Exposes window.LIFEOS_DB with async CRUD, snapshots, import/export.
 */
(function () {
  'use strict';

  // ── Schema ────────────────────────────────────────────────────────────────
  var db = new Dexie('LIFEOS_v1');
  db.version(1).stores({
    categories:     'id',
    blocks:         'id, day, cat',
    allDay:         'id, day, type',
    checklistState: 'blockId',
    settings:       'key',
    syncMeta:       'key',
    snapshots:      '++id, createdAt',
  });

  // ── Change listeners ──────────────────────────────────────────────────────
  var _listeners = [];

  function _notify(data) {
    _listeners.forEach(function(fn) { fn(data); });
  }

  // ── Core load ─────────────────────────────────────────────────────────────
  async function _loadAll() {
    var results = await Promise.all([
      db.categories.toArray(),
      db.blocks.toArray(),
      db.allDay.toArray(),
    ]);
    return { categories: results[0], blocks: results[1], allDay: results[2] };
  }

  async function _notifyFull() {
    var data = await _loadAll();
    _notify(data);
    // Forward to sync layer (file + Gist) if available
    if (window.LIFEOS_SYNC) {
      window.LIFEOS_SYNC.onDataChanged(data);
    }
    return data;
  }

  // ── Public API ────────────────────────────────────────────────────────────
  window.LIFEOS_DB = {
    db: db,

    /** Register a callback invoked after any data mutation.
     *  Receives { categories, blocks, allDay }. */
    onDataChange: function(fn) { _listeners.push(fn); },

    /** Init DB. Seeds from defaultData on first run.
     *  Returns { categories, blocks, allDay, isFirstRun }. */
    init: async function(defaultData) {
      await db.open();
      var count = await db.categories.count();

      if (count === 0) {
        // First run — seed with default/demo data
        await db.transaction('rw', db.categories, db.blocks, db.allDay, async function() {
          await db.categories.bulkPut(defaultData.CATEGORIES);
          await db.blocks.bulkPut(defaultData.WEEK_BLOCKS);
          await db.allDay.bulkPut(defaultData.ALL_DAY);
        });
        return {
          categories: defaultData.CATEGORIES,
          blocks:     defaultData.WEEK_BLOCKS,
          allDay:     defaultData.ALL_DAY,
          isFirstRun: true,
        };
      }

      var data = await _loadAll();
      return Object.assign({ isFirstRun: false }, data);
    },

    loadAll: async function() { return _loadAll(); },

    // ── Blocks ───────────────────────────────────────────────────────────────
    saveBlock: async function(block) {
      await db.blocks.put(block);
      return _notifyFull();
    },

    updateBlock: async function(id, changes) {
      await db.blocks.update(id, changes);
      return _notifyFull();
    },

    deleteBlock: async function(id) {
      await db.blocks.delete(id);
      return _notifyFull();
    },

    // ── Categories ───────────────────────────────────────────────────────────
    saveCategory: async function(category) {
      await db.categories.put(category);
      return _notifyFull();
    },

    updateCategory: async function(id, changes) {
      await db.categories.update(id, changes);
      return _notifyFull();
    },

    // ── All-day items ────────────────────────────────────────────────────────
    saveAllDay: async function(item) {
      await db.allDay.put(item);
      return _notifyFull();
    },

    deleteAllDay: async function(id) {
      await db.allDay.delete(id);
      return _notifyFull();
    },

    // ── Checklist state (granular, no full reload needed) ────────────────────
    saveChecklistState: async function(blockId, checkedSet) {
      await db.checklistState.put({ blockId: blockId, items: Array.from(checkedSet) });
    },

    loadChecklistState: async function(blockId) {
      var r = await db.checklistState.get(blockId);
      return r ? new Set(r.items) : new Set();
    },

    // ── Settings (key/value) ─────────────────────────────────────────────────
    getSetting: async function(key, defaultVal) {
      var r = await db.settings.get(key);
      return (r !== undefined) ? r.value : defaultVal;
    },

    setSetting: async function(key, value) {
      await db.settings.put({ key: key, value: value });
    },

    // ── Snapshots ────────────────────────────────────────────────────────────
    createSnapshot: async function(reason) {
      var data = await _loadAll();
      await db.snapshots.add({
        createdAt: new Date().toISOString(),
        reason:    reason || 'auto',
        data:      data,
      });
      // Keep only 30 most recent
      var all = await db.snapshots.orderBy('id').toArray();
      if (all.length > 30) {
        var toDelete = all.slice(0, all.length - 30).map(function(s) { return s.id; });
        await db.snapshots.bulkDelete(toDelete);
      }
    },

    listSnapshots: async function() {
      return db.snapshots.orderBy('createdAt').reverse().limit(10).toArray();
    },

    restoreSnapshot: async function(id) {
      var snap = await db.snapshots.get(id);
      if (!snap) throw new Error('Snapshot not found: ' + id);
      await db.transaction('rw', db.categories, db.blocks, db.allDay, async function() {
        await db.categories.clear(); await db.categories.bulkPut(snap.data.categories);
        await db.blocks.clear();     await db.blocks.bulkPut(snap.data.blocks);
        await db.allDay.clear();     await db.allDay.bulkPut(snap.data.allDay);
      });
      return _notifyFull();
    },

    // ── Full reset (saves snapshot first) ────────────────────────────────────
    reset: async function(defaultData) {
      await this.createSnapshot('before_reset');
      await db.transaction('rw', db.categories, db.blocks, db.allDay, db.checklistState, async function() {
        await db.categories.clear();    await db.categories.bulkPut(defaultData.CATEGORIES);
        await db.blocks.clear();        await db.blocks.bulkPut(defaultData.WEEK_BLOCKS);
        await db.allDay.clear();        await db.allDay.bulkPut(defaultData.ALL_DAY);
        await db.checklistState.clear();
      });
      return _notifyFull();
    },

    // ── Export / Import ──────────────────────────────────────────────────────
    exportJSON: async function() {
      var data = await _loadAll();
      return JSON.stringify({
        version:    1,
        exportedAt: new Date().toISOString(),
        categories: data.categories,
        blocks:     data.blocks,
        allDay:     data.allDay,
      }, null, 2);
    },

    importJSON: async function(jsonStr) {
      var parsed = JSON.parse(jsonStr);
      var categories = parsed.categories || [];
      var blocks     = parsed.blocks     || parsed.WEEK_BLOCKS || [];
      var allDay     = parsed.allDay     || parsed.ALL_DAY     || [];
      await this.createSnapshot('before_import');
      await db.transaction('rw', db.categories, db.blocks, db.allDay, async function() {
        await db.categories.clear(); await db.categories.bulkPut(categories);
        await db.blocks.clear();     await db.blocks.bulkPut(blocks);
        await db.allDay.clear();     await db.allDay.bulkPut(allDay);
      });
      return _notifyFull();
    },
  };

  console.log('[LIFEOS] DB layer ready (Dexie)');
})();

</script>
<script>
/* LIFEOS — storage/sync.js
 * Two resilience layers on top of IndexedDB:
 *
 *  Layer 2 — File System Access API
 *    Writes lifeos-data.json to a real file on the user's disk.
 *    Survives "Clear site data", browser reinstall, OS reinstall.
 *    FileSystemFileHandle persisted in IndexedDB syncMeta store.
 *
 *  Layer 3 — GitHub Gist
 *    Stores one private JSON file in the user's GitHub account.
 *    Survives device change. Requires a Personal Access Token (scope: gist).
 *    Token stored in localStorage (never leaves the device unless used in fetch).
 *
 * Both are debounced and fully automatic after initial one-time setup.
 * Exposes window.LIFEOS_SYNC.
 */
(function () {
  'use strict';

  // ── Storage keys ─────────────────────────────────────────────────────────
  var FILE_HANDLE_KEY = 'lifeos_file_handle';
  var GIST_TOKEN_KEY  = 'lifeos_gist_token';
  var GIST_ID_KEY     = 'lifeos_gist_id';
  var LAST_SYNC_KEY   = 'lifeos_last_gist_sync';

  // ── Runtime state ─────────────────────────────────────────────────────────
  var _fileHandle = null;
  var _fileTimer  = null;
  var _gistTimer  = null;

  // ── File System Access API internals ──────────────────────────────────────
  async function _restoreFileHandle() {
    try {
      var r = await window.LIFEOS_DB.db.syncMeta.get(FILE_HANDLE_KEY);
      if (!r) return false;
      var handle = r.value;
      // Check/request permission without user gesture (may silently fail)
      var perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') { _fileHandle = handle; return true; }
      // Will need a gesture to actually get permission — store handle for later
      _fileHandle = handle;
      return 'needs-gesture'; // caller can request on next user interaction
    } catch (e) {
      return false;
    }
  }

  async function _ensureFilePermission() {
    if (!_fileHandle) return false;
    try {
      var perm = await _fileHandle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') return true;
      perm = await _fileHandle.requestPermission({ mode: 'readwrite' });
      return perm === 'granted';
    } catch (e) {
      return false;
    }
  }

  async function _writeToFile(data) {
    if (!_fileHandle) return;
    var ok = await _ensureFilePermission();
    if (!ok) return;
    try {
      var writable = await _fileHandle.createWritable();
      await writable.write(JSON.stringify(data, null, 2));
      await writable.close();
    } catch (e) {
      console.warn('[LIFEOS Sync] File write failed:', e.message);
    }
  }

  async function _readFromFile(handle) {
    handle = handle || _fileHandle;
    if (!handle) return null;
    try {
      var file = await handle.getFile();
      var text = await file.text();
      if (!text || text === '{}') return null;
      return JSON.parse(text);
    } catch (e) {
      return null;
    }
  }

  // ── GitHub Gist internals ─────────────────────────────────────────────────
  function _gistToken() { return localStorage.getItem(GIST_TOKEN_KEY); }
  function _gistId()    { return localStorage.getItem(GIST_ID_KEY); }

  function _gistHeaders() {
    var token = _gistToken();
    if (!token) return null;
    return { Authorization: 'token ' + token, 'Content-Type': 'application/json' };
  }

  async function _syncToGist(data) {
    var headers = _gistHeaders();
    var gistId  = _gistId();
    if (!headers || !gistId) return;
    try {
      var res = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH',
        headers: headers,
        body: JSON.stringify({
          files: { 'lifeos-data.json': { content: JSON.stringify(data, null, 2) } },
        }),
      });
      if (res.ok) {
        localStorage.setItem(LAST_SYNC_KEY, new Date().toISOString());
        console.log('[LIFEOS Sync] Gist ✓', new Date().toLocaleTimeString());
      } else {
        console.warn('[LIFEOS Sync] Gist HTTP', res.status);
      }
    } catch (e) {
      console.warn('[LIFEOS Sync] Gist failed:', e.message);
    }
  }

  // ── Public API ────────────────────────────────────────────────────────────
  window.LIFEOS_SYNC = {

    // Called by DB layer after every mutation (debounced internally)
    onDataChanged: function(data) {
      // Layer 2: file on disk (debounced 2 s)
      clearTimeout(_fileTimer);
      _fileTimer = setTimeout(function() { _writeToFile(data); }, 2000);

      // Layer 3: GitHub Gist (debounced 15 min)
      clearTimeout(_gistTimer);
      _gistTimer = setTimeout(function() { _syncToGist(data); }, 15 * 60 * 1000);
    },

    // Called once on app boot — restores any persisted handles
    init: async function() {
      var fileStatus = await _restoreFileHandle();
      return {
        fileConfigured:  !!_fileHandle,
        fileNeedsGesture: fileStatus === 'needs-gesture',
        gistConfigured:  !!(localStorage.getItem(GIST_TOKEN_KEY) && localStorage.getItem(GIST_ID_KEY)),
        lastGistSync:    localStorage.getItem(LAST_SYNC_KEY),
      };
    },

    // Try to load data from file (called on boot if IndexedDB is empty)
    loadFromFile: async function() {
      return _readFromFile();
    },

    // Try to load data from Gist (called on boot if IndexedDB and file both empty)
    loadFromGist: async function() {
      var headers = _gistHeaders();
      var gistId  = _gistId();
      if (!headers || !gistId) return null;
      try {
        var res = await fetch('https://api.github.com/gists/' + gistId, { headers: headers });
        if (!res.ok) return null;
        var gist = await res.json();
        var content = gist.files && gist.files['lifeos-data.json'] && gist.files['lifeos-data.json'].content;
        if (!content || content === '{}') return null;
        return JSON.parse(content);
      } catch (e) {
        console.warn('[LIFEOS Sync] Gist load failed:', e.message);
        return null;
      }
    },

    // ── File setup (requires user gesture) ───────────────────────────────────
    hasFileSupport: function() {
      return typeof window.showSaveFilePicker === 'function';
    },

    isFileConfigured: function() { return !!_fileHandle; },

    // Let user choose where to save — shows OS file picker
    pickSaveFile: async function() {
      if (!this.hasFileSupport()) return { status: 'unsupported' };
      try {
        var handle = await window.showSaveFilePicker({
          suggestedName: 'lifeos-data.json',
          types: [{
            description: 'LIFEOS Data',
            accept: { 'application/json': ['.json'] },
          }],
        });
        await handle.requestPermission({ mode: 'readwrite' });
        await window.LIFEOS_DB.db.syncMeta.put({ key: FILE_HANDLE_KEY, value: handle });
        _fileHandle = handle;
        // Write current data immediately
        var data = await window.LIFEOS_DB.loadAll();
        await _writeToFile(data);
        return { status: 'configured' };
      } catch (e) {
        if (e.name === 'AbortError') return { status: 'cancelled' };
        return { status: 'error', message: e.message };
      }
    },

    // Let user pick an existing lifeos-data.json to restore from
    pickOpenFile: async function() {
      if (!this.hasFileSupport()) return { status: 'unsupported' };
      try {
        var handles = await window.showOpenFilePicker({
          types: [{
            description: 'LIFEOS Data',
            accept: { 'application/json': ['.json'] },
          }],
        });
        var handle = handles[0];
        await handle.requestPermission({ mode: 'readwrite' });
        await window.LIFEOS_DB.db.syncMeta.put({ key: FILE_HANDLE_KEY, value: handle });
        _fileHandle = handle;
        var data = await _readFromFile(handle);
        return { status: 'ok', data: data };
      } catch (e) {
        if (e.name === 'AbortError') return { status: 'cancelled' };
        return { status: 'error', message: e.message };
      }
    },

    disconnectFile: async function() {
      _fileHandle = null;
      try { await window.LIFEOS_DB.db.syncMeta.delete(FILE_HANDLE_KEY); } catch(e) {}
    },

    // ── GitHub Gist setup ────────────────────────────────────────────────────
    isGistConfigured: function() {
      return !!(localStorage.getItem(GIST_TOKEN_KEY) && localStorage.getItem(GIST_ID_KEY));
    },

    getLastSync: function() {
      var iso = localStorage.getItem(LAST_SYNC_KEY);
      return iso ? new Date(iso) : null;
    },

    // Validate token + create/find Gist + do initial sync
    setupGist: async function(token) {
      // 1. Validate token
      try {
        var testRes = await fetch('https://api.github.com/user', {
          headers: { Authorization: 'token ' + token },
        });
        if (!testRes.ok) return { status: 'invalid_token' };
      } catch(e) {
        return { status: 'network_error', message: e.message };
      }

      // 2. Look for an existing LIFEOS gist
      var gistsRes = await fetch('https://api.github.com/gists?per_page=100', {
        headers: { Authorization: 'token ' + token },
      });
      var gists = await gistsRes.json();
      var existing = Array.isArray(gists)
        ? gists.find(function(g) { return g.files && g.files['lifeos-data.json']; })
        : null;

      var gistId;
      var existingDataFound = false;

      if (existing) {
        gistId = existing.id;
        existingDataFound = true;
      } else {
        // 3. Create a new private gist
        var createRes = await fetch('https://api.github.com/gists', {
          method: 'POST',
          headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            description: 'LIFEOS — Personal Life OS Backup',
            public: false,
            files: { 'lifeos-data.json': { content: '{}' } },
          }),
        });
        var gist = await createRes.json();
        gistId = gist.id;
      }

      localStorage.setItem(GIST_TOKEN_KEY, token);
      localStorage.setItem(GIST_ID_KEY, gistId);

      // 4. Sync current data immediately
      var data = await window.LIFEOS_DB.loadAll();
      await _syncToGist(data);

      return { status: 'configured', gistId: gistId, existingDataFound: existingDataFound };
    },

    // Force an immediate sync (e.g., from "Sync now" button)
    syncNow: async function() {
      var data = await window.LIFEOS_DB.loadAll();
      await _syncToGist(data);
      await _writeToFile(data);
    },

    disconnectGist: function() {
      localStorage.removeItem(GIST_TOKEN_KEY);
      localStorage.removeItem(GIST_ID_KEY);
      localStorage.removeItem(LAST_SYNC_KEY);
    },

    // ── Backup helpers ────────────────────────────────────────────────────────
    // Download a JSON file via browser download dialog
    downloadBackup: async function() {
      var json = await window.LIFEOS_DB.exportJSON();
      var blob = new Blob([json], { type: 'application/json' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href     = url;
      a.download = 'lifeos-backup-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },

    // Import from a File object (e.g., from <input type="file">)
    importFromFile: async function(file) {
      var text = await file.text();
      return window.LIFEOS_DB.importJSON(text);
    },
  };

  console.log('[LIFEOS] Sync layer ready (FSAA + Gist)');
})();

</script>

// ============== DAY VIEW ==============
function DayView({ blocks, allDayItems, dayIndex, onOpenBlock }) {
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h++) hours.push(h);

  const isToday = dayIndex === NOW.day;
  const containerRef = useRef(null);

  // Dynamic pixel-per-hour: scale up so the shortest event gets at least 72px height.
  // Capped at 180px/hour to keep the view reasonable on very short events.
  const hpx = useMemo(() => {
    if (!blocks.length) return HOUR_PX;
    const minDur = Math.min(...blocks.map(b => b.end - b.start));
    const needed = Math.ceil(72 / minDur);
    return Math.min(Math.max(HOUR_PX, needed), 180);
  }, [blocks]);

  const totalH = (DAY_END - DAY_START) * hpx + 24;

  // Resolve overlap into columns
  const laid = useMemo(() => layoutOverlaps(blocks), [blocks]);

  // Scroll to ~now on mount (using dynamic hpx)
  useEffect(() => {
    if (containerRef.current && isToday) {
      const targetY = (NOW.hour - DAY_START - 1) * hpx;
      containerRef.current.scrollTop = Math.max(0, targetY);
    }
  }, [isToday, hpx]);

  return (
    <div className="dayview" ref={containerRef}>
      <div className="hours-gutter" style={{ height: totalH }}>
        {hours.map(h => (
          <div key={h} className="hour-label" style={{ top: (h - DAY_START) * hpx }}>
            {String(h).padStart(2, '0')}:00
          </div>
        ))}
      </div>
      <div className="day-canvas" style={{ height: totalH, position: 'relative' }}>
        {hours.map(h => (
          <div key={h} className="day-grid-line" style={{ top: (h - DAY_START) * hpx }} />
        ))}
        {hours.slice(0, -1).map(h => (
          <div key={`h${h}`} className="day-grid-line half" style={{ top: (h + 0.5 - DAY_START) * hpx }} />
        ))}

        {laid.map(({ block, col, cols }) => {
          const top = (block.start - DAY_START) * hpx;
          const height = Math.max((block.end - block.start) * hpx - 3, 28);
          const widthPct = 100 / cols;
          const leftPct = col * widthPct;
          return (
            <button
              key={block.id}
              className="block"
              style={{
                ...tintStyle(block.cat),
                top, height,
                left: `calc(${leftPct}% + 12px)`,
                width: `calc(${widthPct}% - 16px)`,
                right: 'auto',
              }}
              onClick={() => onOpenBlock(block)}
              data-block-id={block.id}
            >
              <div className="block-title">{block.title}</div>
              {height > 38 && (
                <div className="block-time">
                  {fmtH(block.start)} <span style={{ opacity: 0.5 }}>→</span> {fmtH(block.end)}
                  {block.recur && <span className="recur" style={{ marginLeft: 'auto' }}><Icon name="recur" size={11}/></span>}
                </div>
              )}
              {height > 80 && block.location && (
                <div className="block-meta">
                  <Icon name="pin" size={11}/>{block.location}
                </div>
              )}
              {height > 110 && block.checklist && (
                <div className="block-meta">
                  <Icon name="check" size={11}/>{block.checklist.length} пунктов
                </div>
              )}
            </button>
          );
        })}

        {isToday && (
          <div className="now-bar" style={{ top: (NOW.hour - DAY_START) * hpx }}>
            <span className="now-label">{fmtH(NOW.hour)}</span>

// Greedy column packing for overlapping blocks
function layoutOverlaps(blocks) {
  const sorted = [...blocks].sort((a, b) => a.start - b.start || b.end - b.start - (a.end - a.start));
  const cols = []; // cols[i] = last end time
  const placed = [];
  for (const b of sorted) {
    let placedCol = -1;
    for (let i = 0; i < cols.length; i++) {
      if (cols[i] <= b.start) { placedCol = i; break; }
    }
    if (placedCol === -1) { cols.push(b.end); placedCol = cols.length - 1; }
    else cols[placedCol] = b.end;
    placed.push({ block: b, col: placedCol });
  }
  // For each block, determine the total parallel cols at that time
  return placed.map(({ block, col }) => {
    const parallel = placed.filter(p => p.block.start < block.end && p.block.end > block.start);
    const maxCol = Math.max(...parallel.map(p => p.col));
    return { block, col, cols: maxCol + 1 };
  });
}

// ============== WEEK VIEW ==============
function WeekView({ onOpenBlock, density, onSelectDay }) {
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h++) hours.push(h);

  // Categorical density visualisation
  const colDensity = useMemo(() => {
    const out = WEEK_DATES.map(() => ({}));
    WEEK_BLOCKS.forEach(b => {
      out[b.day][b.cat] = (out[b.day][b.cat] || 0) + (b.end - b.start);
    });
    return out;
  }, []);

  return (
    <div className="weekview">
      <div className="hours-gutter" style={{ paddingTop: 88, position: 'relative' }}>
        {hours.map(h => (
          <div key={h} className="hour-label" style={{ top: 88 + (h - DAY_START) * HOUR_PX }}>
            {String(h).padStart(2, '0')}:00
          </div>
        ))}
      </div>

      <div className="weekgrid">
        <div className="week-heads">
          {WEEK_DATES.map((date, i) => (
            <div key={i} className={`week-head ${i === NOW.day ? 'today' : ''}`} onClick={() => onSelectDay && onSelectDay(i)}>
              <div className="dow">{DOW_SHORT[i]}</div>
              <div className="dom">{date}</div>
              <div className="density-bar">
                {Object.entries(colDensity[i]).map(([cat, h]) => (
                  <span key={cat} style={{ '--seg': `var(--c-${cat}-bar)`, flex: h }} />
                ))}
              </div>
            </div>
          ))}
        </div>

        <div className="week-cols">
          {WEEK_DATES.map((date, dayIdx) => {
            const dayBlocks = WEEK_BLOCKS.filter(b => b.day === dayIdx);
            const laid = layoutOverlaps(dayBlocks);
            return (
              <div key={dayIdx} className={`week-col ${dayIdx === NOW.day ? 'today' : ''}`} style={{ height: (DAY_END - DAY_START) * HOUR_PX + 24 }}>
                {hours.map(h => (
                  <div key={h} className="day-grid-line" style={{ top: (h - DAY_START) * HOUR_PX }} />
                ))}
                {laid.map(({ block, col, cols }) => {
                  const top = (block.start - DAY_START) * HOUR_PX;
                  const height = Math.max((block.end - block.start) * HOUR_PX - 2, 18);
                  const widthPct = 100 / cols;
                  return (
                    <button
                      key={block.id}
                      className="block"
                      style={{
                        ...tintStyle(block.cat),
                        top, height,
                        left: `calc(${col * widthPct}% + 3px)`,
                        width: `calc(${widthPct}% - 6px)`,
                        right: 'auto',
                      }}
                      onClick={() => onOpenBlock(block)}
                      data-block-id={block.id}
                    >
                      <div className="block-title" style={{ fontSize: 11.5 }}>{block.title}</div>
                      {height > 28 && (
                        <div className="block-time" style={{ fontSize: 9.5 }}>{fmtH(block.start)}</div>
                      )}
                    </button>
                  );
                })}
                {dayIdx === NOW.day && (
                  <div className="now-bar" style={{ top: (NOW.hour - DAY_START) * HOUR_PX, left: 0 }}>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============== DAILY SUMMARY ==============
function DailySummary({ dayIndex, onOpenOverview }) {
  const dayBlocks = WEEK_BLOCKS.filter(b => b.day === dayIndex);
  const allDay = ALL_DAY.filter(a => a.day === dayIndex);

  const overdue = dayIndex === NOW.day ? 1 : 0;
  const totalHrs = dayBlocks.reduce((s, b) => s + (b.end - b.start), 0);

  return (
    <div className="summary">
      <button className="sum-chip" onClick={onOpenOverview}>
        <span className="sum-num">{dayBlocks.length}</span>
        <span>тайм-блоков</span>

}

          <span className="search-kbd">esc</span>
